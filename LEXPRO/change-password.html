<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | Change Password</title>
<style>
  :root {
    --bg: #ffffff; --surface: #f7f7f7; --surface-2: #f0f0f0; --border: #e8e8e8;
    --primary: #111111; --text: #111111; --text-muted: #666666; --text-hint: #888888;
    --error-bg: rgba(220,53,69,0.07); --error-border: rgba(220,53,69,0.2); --error-text: #cc2233;
    --green: #065F46; --green-bg: #D1FAE5;
    --font: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-sm: 10px; --radius-lg: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100vh; background: var(--bg); font-family: var(--font); color: var(--text);
    display: flex; flex-direction: column;
  }

  .topbar {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .back-btn {
    width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
    text-decoration: none; flex-shrink: 0;
  }

  .back-btn svg { width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .topbar-title { font-size: 17px; font-weight: 700; }

  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }

  .card {
    width: 100%; max-width: 380px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 32px 28px; box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  }

  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.5; }
  .card-sub strong { color: var(--text); }

  .field { margin-bottom: 14px; }

  .field label {
    display: block; font-size: 9px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 7px;
  }

  .pw-wrap { position: relative; }

  .pw-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 48px 14px 16px; font-size: 15px;
    font-family: var(--font); color: var(--text); outline: none;
    transition: border-color 0.18s, box-shadow 0.18s; -webkit-appearance: none;
  }

  .pw-wrap input::placeholder { color: #999999; }

  .pw-wrap input:focus {
    border-color: var(--primary); background: var(--bg);
    box-shadow: 0 0 0 3px rgba(17,17,17,0.07);
  }

  .eye-btn {
    position: absolute; top: 50%; right: 6px; transform: translateY(-50%);
    width: 38px; height: 38px; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; border-radius: 8px;
  }

  .eye-btn:active { background: var(--surface-2); }

  .eye-btn svg { width: 20px; height: 20px; stroke: var(--text-hint); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .eye-btn.showing svg { stroke: var(--primary); }
  .eye-open { display: block; }
  .eye-closed { display: none; }
  .eye-btn.showing .eye-open { display: none; }
  .eye-btn.showing .eye-closed { display: block; }

  .btn-save {
    width: 100%; margin-top: 10px; padding: 16px; background: var(--primary); border: none;
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; font-family: var(--font);
    color: #ffffff; cursor: pointer; letter-spacing: 0.14em; text-transform: uppercase;
    transition: opacity 0.18s, transform 0.1s;
  }

  .btn-save:active { transform: scale(0.98); opacity: 0.85; }
  .btn-save:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .msg {
    display: none; margin-top: 14px; padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 13px; text-align: center;
  }

  .msg.error { display: block; background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
  .msg.success { display: block; background: var(--green-bg); border: 1px solid var(--green-bg); color: var(--green); }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="home.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Change Password</div>
</div>

<div class="main">
  <div class="card">
    <div class="card-sub">Changing password for <strong id="whoAmI">&mdash;</strong>. You'll use the new password starting with your next sign-in. Face ID keeps working as usual.</div>

    <div class="field">
      <label>Current Password</label>
      <div class="pw-wrap">
        <input type="password" id="currentPw" placeholder="Enter current password" autocomplete="current-password" />
        <button type="button" class="eye-btn" data-target="currentPw">
          <svg class="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><path d="M14.12 14.12A3 3 0 119.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>New Password</label>
      <div class="pw-wrap">
        <input type="password" id="newPw" placeholder="Enter new password" autocomplete="new-password" />
        <button type="button" class="eye-btn" data-target="newPw">
          <svg class="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><path d="M14.12 14.12A3 3 0 119.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Confirm New Password</label>
      <div class="pw-wrap">
        <input type="password" id="confirmPw" placeholder="Re-enter new password" autocomplete="new-password" />
        <button type="button" class="eye-btn" data-target="confirmPw">
          <svg class="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><path d="M14.12 14.12A3 3 0 119.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-save" id="saveBtn">Update Password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  const user = JSON.parse(sessionStorage.getItem('lexpro_user') || '{}');
  if (!user.username) window.location.href = 'index.html';

  document.getElementById('whoAmI').textContent = user.username;

  document.querySelectorAll('.eye-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.classList.toggle('showing', !showing);
    });
  });

  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function showMsg(text, type) {
    const m = document.getElementById('msg');
    m.textContent = text;
    m.className = 'msg ' + type;
  }

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const currentPw = document.getElementById('currentPw').value;
    const newPw = document.getElementById('newPw').value;
    const confirmPw = document.getElementById('confirmPw').value;
    const btn = document.getElementById('saveBtn');

    document.getElementById('msg').className = 'msg';

    if (!currentPw || !newPw || !confirmPw) {
      showMsg('Please fill in all three fields.', 'error');
      return;
    }
    if (newPw.length < 6) {
      showMsg('New password needs to be at least 6 characters.', 'error');
      return;
    }
    if (newPw !== confirmPw) {
      showMsg('New passwords do not match.', 'error');
      return;
    }
    if (newPw === currentPw) {
      showMsg('New password is the same as the current one.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Updating...';

    try {
      const hashes = await Promise.all([sha256(currentPw), sha256(newPw)]);

      const res = await fetch('/.netlify/functions/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user.username, currentHash: hashes[0], newHash: hashes[1] })
      });

      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || 'Something went wrong. Try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
        return;
      }

      showMsg('Password updated! Use the new one next time you sign in.', 'success');
      document.getElementById('currentPw').value = '';
      document.getElementById('newPw').value = '';
      document.getElementById('confirmPw').value = '';
      btn.disabled = false;
      btn.textContent = 'Update Password';

    } catch (err) {
      showMsg('Connection error. Try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  });
</script>
</body>
</html>
