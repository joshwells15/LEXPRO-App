<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | Outreach</title>
<style>
  :root {
    --bg:           #ffffff;
    --surface:      #f7f7f7;
    --surface-2:    #f0f0f0;
    --border:       #e8e8e8;
    --primary:      #111111;
    --text:         #111111;
    --text-muted:   #666666;
    --text-hint:    #999999;
    --urgent:       #cc2233;
    --warning:      #b86e00;
    --font:         'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-sm:    10px;
    --radius-md:    14px;
    --radius-lg:    20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; background: var(--bg); font-family: var(--font); color: var(--text); display: flex; flex-direction: column; }

  /* ── Top Bar ── */
  .topbar { background: var(--primary); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .back-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; transition: background 0.15s; }
  .back-btn:active { background: rgba(255,255,255,0.15); }
  .back-btn svg { width: 16px; height: 16px; stroke: #ffffff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-title { font-size: 18px; font-weight: 600; color: #ffffff; flex: 1; letter-spacing: -0.2px; }
  .topbar-icons { display: flex; gap: 8px; }
  .icon-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; text-decoration: none; position: relative; flex-shrink: 0; }
  .icon-btn svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.7); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .notif-dot { position: absolute; top: 7px; right: 7px; width: 6px; height: 6px; background: #ffffff; border-radius: 50%; border: 1.5px solid var(--primary); display: none; }
  .add-btn { width: 36px; height: 36px; background: #ffffff; border: none; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .add-btn:active { background: var(--surface-2); }
  .add-btn svg { width: 18px; height: 18px; stroke: var(--primary); fill: none; stroke-width: 2.5; stroke-linecap: round; }

  /* ── Content ── */
  .content { flex: 1; overflow-y: auto; padding: 20px 0 40px; }

  .category-section { margin-bottom: 32px; }
  .category-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 12px; }
  .category-name { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; }
  .category-count { font-size: 11px; color: var(--primary); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 10px; border-radius: 20px; font-weight: 600; }

  .cards-row { display: flex; gap: 12px; padding: 4px 20px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
  .cards-row::-webkit-scrollbar { display: none; }

  .contact-card { flex-shrink: 0; width: 116px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.1s; text-decoration: none; }
  .contact-card:active { transform: scale(0.96); }
  .contact-card.urgent { border-color: rgba(204,34,51,0.3); background: rgba(204,34,51,0.03); }
  .contact-card.warning { border-color: rgba(184,110,0,0.3); background: rgba(184,110,0,0.03); }

  .avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 700; color: #ffffff; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .contact-name { font-size: 12px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.2; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .days-badge { font-size: 10px; color: var(--text-hint); text-align: center; }
  .days-badge.urgent { color: var(--urgent); font-weight: 500; }
  .days-badge.warning { color: var(--warning); font-weight: 500; }

  .empty-row { padding: 20px; text-align: center; color: var(--text-hint); font-size: 13px; }

  .loading-row { padding: 4px 20px; display: flex; gap: 12px; }
  .skeleton { flex-shrink: 0; width: 116px; height: 136px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .error-banner { margin: 16px 20px; padding: 12px 16px; background: rgba(204,34,51,0.06); border: 1px solid rgba(204,34,51,0.18); border-radius: var(--radius-sm); font-size: 13px; color: var(--urgent); display: none; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 24px 24px 48px; width: 100%; max-width: 480px; box-shadow: 0 -4px 32px rgba(0,0,0,0.1); }
  .modal-handle { width: 36px; height: 4px; background: var(--surface-2); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 20px; letter-spacing: -0.2px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px; }
  .modal-field input, .modal-field select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; font-family: var(--font); color: var(--text); outline: none; -webkit-appearance: none; transition: border-color 0.15s; }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--primary); background: var(--bg); }
  .modal-field input::placeholder { color: var(--text-hint); }
  .modal-field select option { background: var(--bg); color: var(--text); }
  .modal-row { display: flex; gap: 12px; }
  .modal-row .modal-field { flex: 1; }
  .modal-btn { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: var(--font); color: #ffffff; cursor: pointer; margin-top: 8px; letter-spacing: 0.06em; text-transform: uppercase; transition: opacity 0.15s; }
  .modal-btn:disabled { opacity: 0.45; }
  .modal-cancel { width: 100%; padding: 12px; background: none; border: none; font-size: 14px; font-family: var(--font); color: var(--text-hint); cursor: pointer; margin-top: 6px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="home.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Outreach</div>
  <div class="topbar-icons">
    <a class="icon-btn" href="notifications.html">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div class="notif-dot" id="notifDot"></div>
    </a>
    <a class="icon-btn" href="calendar.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </a>
    <div class="add-btn" onclick="openAddModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
  </div>
</div>

<div class="content">
  <div id="errorBanner" class="error-banner"></div>
  <div class="category-section" id="section-undercontract">
    <div class="category-header">
      <div class="category-name">Under Contract</div>
      <div class="category-count" id="count-undercontract">...</div>
    </div>
    <div class="loading-row">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>
  <div class="category-section" id="section-pastclient">
    <div class="category-header">
      <div class="category-name">Past Client</div>
      <div class="category-count" id="count-pastclient">...</div>
    </div>
    <div class="loading-row">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>
  <div class="category-section" id="section-nonrealestate">
    <div class="category-header">
      <div class="category-name">Non-Real Estate</div>
      <div class="category-count" id="count-nonrealestate">...</div>
    </div>
    <div class="loading-row">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Contact</div>
    <div class="modal-row">
      <div class="modal-field">
        <label>First Name *</label>
        <input type="text" id="addFirstName" placeholder="First" autocapitalize="words" />
      </div>
      <div class="modal-field">
        <label>Last Name *</label>
        <input type="text" id="addLastName" placeholder="Last" autocapitalize="words" />
      </div>
    </div>
    <div class="modal-field">
      <label>Phone *</label>
      <input type="tel" id="addPhone" placeholder="(555) 000-0000" />
    </div>
    <div class="modal-field">
      <label>Email</label>
      <input type="email" id="addEmail" placeholder="Optional" autocapitalize="none" />
    </div>
    <div class="modal-field">
      <label>Category *</label>
      <select id="addCategory">
        <option value="nonrealestate">Non-Real Estate</option>
        <option value="pastclient">Past Client High Priority</option>
        <option value="undercontract">Under Contract High Priority</option>
      </select>
    </div>
    <button class="modal-btn" id="addSubmitBtn" onclick="submitAddContact()">Add Contact</button>
    <button class="modal-cancel" onclick="closeAddModal()">Cancel</button>
  </div>
</div>

<script>
  const GHL_API_KEY = 'pit-4e98487c-3f65-409c-a264-16352f97c01a';
  const GHL_LOCATION_ID = 'R5PobkV1CRO23kz95yYB';
  const SUPABASE_URL = 'https://dqiiekdfmocvizzvmwlc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaWlla2RmbW9jdml6enZtd2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjcwOTcsImV4cCI6MjA5MTMwMzA5N30.Njm_nwlOJiHaapqeqj1ZhInkFUHiAqoglB5LuVauCwM';

  const FIELD_IDS = {
    undercontract: 'WJpjUfmXknuiu0YA2bWZ',
    pastclient: 'iRKaQwflgSSw1dAkVjSj',
    nonrealestate: 'RTRFT9ZMWYFBX2TR8HKK'
  };
  const SMART_LISTS = {
    undercontract: { id: 'bilVSIKctbbER7pTzBeE', label: 'Under Contract' },
    pastclient: { id: 'NAkVeODObsopGpvrA7a9', label: 'Past Client' },
    nonrealestate: { id: 'GCgSfHVKwmoaFB270HLH', label: 'Non-Real Estate' }
  };
  const AVATAR_COLORS = ['#2a2a2a','#444444','#333333','#555555','#1a1a1a','#3a3a3a'];

  const user = JSON.parse(sessionStorage.getItem('lexpro_user') || '{}');
  if (!user.username) window.location.href = 'index.html';

  async function checkUnread() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/notifications?is_read=eq.false&limit=1`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const data = await res.json();
      if (data && data.length > 0) document.getElementById('notifDot').style.display = 'block';
    } catch(e) {}
  }

  checkUnread();

  function getInitials(first, last) {
    return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase() || '?';
  }

  function getAvatarColor(name) {
    let hash = 0;
    for (let c of name) hash = c.charCodeAt(0) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  function getDaysSince(dateStr) {
    if (!dateStr) return null;
    return Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  }

  function getDaysLabel(days) {
    if (days === null) return 'Never contacted';
    if (days === 0) return 'Today';
    if (days === 1) return '1 day ago';
    return `${days} days ago`;
  }

  function getDaysClass(days) {
    if (days === null || days > 30) return 'urgent';
    if (days > 14) return 'warning';
    return '';
  }

  async function fetchSmartList(key) {
    try {
      const res = await fetch(
        `https://services.leadconnectorhq.com/contacts/?locationId=${GHL_LOCATION_ID}&limit=100`,
        { headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' } }
      );
      if (!res.ok) throw new Error(`GHL API error: ${res.status}`);
      const data = await res.json();
      const allContacts = data.contacts || [];

      const enriched = await Promise.all(allContacts.map(async c => {
        if (c.customFields && c.customFields.length > 0) return c;
        try {
          const r2 = await fetch(`https://services.leadconnectorhq.com/contacts/${c.id}`, {
            headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
          });
          const d2 = await r2.json();
          return d2.contact || c;
        } catch { return c; }
      }));

      const contacts = enriched.filter(c => {
        const cf = c.customFields || [];
        return cf.some(f => {
          const val = Array.isArray(f.value) ? f.value[0] : f.value;
          return f.id === FIELD_IDS[key] && (String(val).toLowerCase() === 'yes' || val === true || val === 'true' || val === '1');
        });
      });

      contacts.sort((a, b) => {
        const da = getDaysSince(a.dateLastContacted || a.dateUpdated);
        const db = getDaysSince(b.dateLastContacted || b.dateUpdated);
        return (db ?? 9999) - (da ?? 9999);
      });

      renderCategory(key, contacts);
    } catch (err) {
      renderCategoryError(key, err.message);
    }
  }

  function renderCategory(key, contacts) {
    const section = document.getElementById(`section-${key}`);
    const countEl = document.getElementById(`count-${key}`);
    countEl.textContent = contacts.length;

    if (contacts.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-row';
      empty.textContent = 'No contacts in this category';
      section.querySelector('.loading-row, .cards-row, .empty-row')?.remove();
      section.appendChild(empty);
      return;
    }

    const row = document.createElement('div');
    row.className = 'cards-row';

    for (const c of contacts) {
      const days = getDaysSince(c.dateLastContacted || c.dateUpdated);
      const daysClass = getDaysClass(days);
      const initials = getInitials(c.firstName, c.lastName);
      const color = getAvatarColor((c.firstName || '') + (c.lastName || ''));
      const firstName = c.firstName || c.name?.split(' ')[0] || 'Unknown';

      const card = document.createElement('div');
      card.className = `contact-card ${daysClass}`;
      card.onclick = () => {
        sessionStorage.setItem('lexpro_contact', JSON.stringify(c));
        window.location.href = `contact.html?id=${c.id}&cat=${key}`;
      };

      card.innerHTML = `
        <div class="avatar" style="background:${color}">
          ${c.profilePhoto ? `<img src="${c.profilePhoto}" onerror="this.parentElement.textContent='${initials}'" />` : initials}
        </div>
        <div class="contact-name">${firstName}</div>
        <div class="days-badge ${daysClass}">${getDaysLabel(days)}</div>
      `;

      row.appendChild(card);
    }

    section.querySelector('.loading-row, .cards-row, .empty-row')?.remove();
    section.appendChild(row);
  }

  function renderCategoryError(key, msg) {
    const section = document.getElementById(`section-${key}`);
    const countEl = document.getElementById(`count-${key}`);
    countEl.textContent = 'Error';
    const empty = document.createElement('div');
    empty.className = 'empty-row';
    empty.style.color = '#cc2233';
    empty.textContent = 'Could not load — check API connection';
    section.querySelector('.loading-row, .cards-row, .empty-row')?.remove();
    section.appendChild(empty);
    const banner = document.getElementById('errorBanner');
    banner.style.display = 'block';
    banner.textContent = `GHL API error: ${msg}`;
  }

  function openAddModal() { document.getElementById('addModal').classList.add('open'); }
  function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

  async function submitAddContact() {
    const first = document.getElementById('addFirstName').value.trim();
    const last = document.getElementById('addLastName').value.trim();
    const phone = document.getElementById('addPhone').value.trim();
    const email = document.getElementById('addEmail').value.trim();
    const cat = document.getElementById('addCategory').value;

    if (!first || !last || !phone) {
      alert('First name, last name, and phone are required.');
      return;
    }

    const btn = document.getElementById('addSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    const payload = {
      locationId: GHL_LOCATION_ID,
      firstName: first,
      lastName: last,
      phone: phone,
      email: email || undefined,
      customFields: [{ id: FIELD_IDS[cat], value: 'Yes' }]
    };

    try {
      const res = await fetch('https://services.leadconnectorhq.com/contacts/', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`${res.status}`);
      closeAddModal();
      btn.disabled = false;
      btn.textContent = 'Add Contact';
      document.getElementById('addFirstName').value = '';
      document.getElementById('addLastName').value = '';
      document.getElementById('addPhone').value = '';
      document.getElementById('addEmail').value = '';
      fetchSmartList(cat);
    } catch (err) {
      alert(`Failed to add contact: ${err.message}`);
      btn.disabled = false;
      btn.textContent = 'Add Contact';
    }
  }

  fetchSmartList('undercontract');
  fetchSmartList('pastclient');
  fetchSmartList('nonrealestate');
</script>
</body>
</html>
