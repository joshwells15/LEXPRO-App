<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | My Tasks</title>
<style>
  :root {
    --bg: #ffffff; --surface: #f7f7f7; --surface-2: #f0f0f0; --border: #e8e8e8;
    --primary: #111111; --text: #111111; --text-muted: #666666; --text-hint: #999999;
    --font: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-sm: 10px; --radius-md: 14px; --radius-lg: 20px;
    --green: #065F46; --green-bg: #D1FAE5;
    --amber: #78350F; --amber-bg: #FEF3C7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100vh; min-height: 100dvh;
    background: var(--bg); font-family: var(--font); color: var(--text);
    display: flex; flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
  }

  .back-btn {
    width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
    text-decoration: none; flex-shrink: 0;
  }

  .back-btn svg { width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .topbar-info { flex: 1; min-width: 0; }
  .topbar-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .topbar-sub { font-size: 11px; color: var(--text-hint); margin-top: 1px; }

  .refresh-btn {
    width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }

  .refresh-btn svg { width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* TABS */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
  }

  .tab-btn {
    flex: 1; padding: 12px 8px; border: none; background: none; font-family: var(--font);
    font-size: 13px; font-weight: 500; color: var(--text-hint); cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
  }

  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

  /* LOADING */
  .loading-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 24px; gap: 12px;
  }

  .loading-spinner {
    width: 32px; height: 32px; border: 2.5px solid var(--border); border-top-color: var(--primary);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label { font-size: 14px; color: var(--text-hint); }

  /* EMPTY */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 24px; gap: 12px; text-align: center;
  }

  .empty-icon {
    width: 52px; height: 52px; background: var(--green-bg); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .empty-icon svg { width: 22px; height: 22px; stroke: var(--green); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .empty-title { font-size: 17px; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: 13px; color: var(--text-hint); max-width: 240px; line-height: 1.5; }

  /* TASK CARDS */
  .task-list { display: flex; flex-direction: column; gap: 12px; }

  .task-card {
    border: 1.5px solid var(--border); border-radius: var(--radius-lg);
    background: var(--bg); overflow: hidden; transition: border-color 0.2s;
  }

  .task-card.completing { border-color: var(--green); opacity: 0.6; }
  .task-card.done { border-color: var(--green-bg); background: var(--green-bg); }

  .task-card-body { padding: 16px; }

  .task-meta {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }

  .task-from {
    font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.08em;
  }

  .task-due {
    font-size: 11px; color: var(--text-hint); margin-left: auto;
    background: var(--amber-bg); color: var(--amber); padding: 2px 8px;
    border-radius: 999px; font-weight: 500;
  }

  .task-text {
    font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.45;
  }

  .task-card.done .task-text { color: var(--green); text-decoration: line-through; }

  .task-date {
    font-size: 11px; color: var(--text-hint); margin-top: 6px;
  }

  .task-card-footer {
    border-top: 1px solid var(--border); display: flex;
  }

  .task-card.done .task-card-footer { border-top-color: transparent; }

  .complete-btn {
    flex: 1; padding: 13px; background: none; border: none; font-family: var(--font);
    font-size: 14px; font-weight: 600; color: var(--primary); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s;
  }

  .complete-btn:active { background: var(--surface); }
  .complete-btn:disabled { color: var(--text-hint); cursor: not-allowed; }

  .complete-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .done-label {
    flex: 1; padding: 13px; text-align: center; font-size: 14px;
    font-weight: 600; color: var(--green); display: none;
    align-items: center; justify-content: center; gap: 6px;
  }

  .task-card.done .done-label { display: flex; }
  .task-card.done .complete-btn { display: none; }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-hint); margin-bottom: 10px; margin-top: 20px;
  }

  .section-label:first-child { margin-top: 0; }

  /* TOAST */
  .toast {
    display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #111; color: white; padding: 11px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500; z-index: 200; white-space: nowrap;
  }
  .toast.show { display: block; }
  .toast.success { background: var(--green); }
  .toast.error { background: #DC2626; }

  /* CONFIRM MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal-sheet {
    background: var(--bg); border-radius: 24px 24px 0 0; padding: 24px 20px 40px;
    width: 100%; max-width: 560px;
  }

  .modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .modal-sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }

  .modal-task-preview {
    background: var(--surface); border-radius: var(--radius-md); padding: 14px;
    font-size: 15px; color: var(--text); font-weight: 500; margin-bottom: 20px;
    line-height: 1.4;
  }

  .modal-actions { display: flex; gap: 10px; }

  .modal-cancel {
    flex: 1; height: 50px; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); font-family: var(--font); font-size: 15px;
    font-weight: 600; color: var(--text-muted); cursor: pointer;
  }

  .modal-confirm {
    flex: 2; height: 50px; background: var(--primary); color: #ffffff; border: none;
    border-radius: var(--radius-lg); font-family: var(--font); font-size: 15px;
    font-weight: 600; cursor: pointer; transition: background 0.15s;
  }

  .modal-confirm:active { background: #2a2a2a; }
  .modal-confirm:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="team-chat.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-info">
    <div class="topbar-title">My Tasks</div>
    <div class="topbar-sub" id="topbarSub">Loading...</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" title="Refresh">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
  </button>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="open" id="tabOpen">Open</button>
  <button class="tab-btn" data-tab="done" id="tabDone">Completed</button>
</div>

<div class="content" id="content">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <div class="loading-label">Loading your tasks...</div>
  </div>
</div>

<!-- COMPLETE MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-title">Mark as complete?</div>
    <div class="modal-sub">Lex will be notified via SMS that this task is done.</div>
    <div class="modal-task-preview" id="modalTaskPreview"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancel</button>
      <button class="modal-confirm" id="modalConfirm">Mark Complete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──
  const SUPABASE_URL = 'https://dqiiekdfmocvizzvmwlc.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_TCNeI1Mg36-kXLJKA33h1g_emUHiC-Z';

  // Username → assignee key mapping
  const USER_ASSIGNEE_MAP = {
    tanya:  'tanya',
    justin: 'justin',
    josh:   'josh',
    lex:    'lex',
  };

  const user = JSON.parse(sessionStorage.getItem('lexpro_user') || '{}');
  if (!user.username) window.location.href = 'index.html';

  const username = (user.username || '').toLowerCase();
  const assigneeKey = USER_ASSIGNEE_MAP[username] || username;
  const displayName = username.charAt(0).toUpperCase() + username.slice(1);

  document.getElementById('topbarSub').textContent = displayName + "'s tasks";

  let allTasks = [];
  let activeTab = 'open';
  let pendingCompleteId = null;

  // ── TOAST ──
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' '+type : '');
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  // ── TABS ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      renderTasks();
    });
  });

  // ── LOAD TASKS ──
  async function loadTasks() {
    document.getElementById('content').innerHTML = `
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-label">Loading your tasks...</div>
      </div>`;

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/lex_tasks?assignee=eq.${assigneeKey}&order=created_at.desc&limit=50`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
        }
      });

      if (!res.ok) throw new Error('Supabase fetch failed: ' + res.status);

      allTasks = await res.json();
      renderTasks();

    } catch (err) {
      console.error(err);
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <div class="empty-title">Could not load tasks</div>
          <div class="empty-sub">Check your connection and hit the refresh button.</div>
        </div>`;
    }
  }

  // ── RENDER ──
  function renderTasks() {
    const content = document.getElementById('content');
    const filtered = allTasks.filter(t => activeTab === 'open' ? t.status !== 'complete' : t.status === 'complete');

    if (!filtered.length) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="empty-title">${activeTab === 'open' ? 'All clear!' : 'Nothing completed yet'}</div>
          <div class="empty-sub">${activeTab === 'open' ? 'No open tasks right now. Check back after your next chat with Lex.' : 'Completed tasks will show up here.'}</div>
        </div>`;
      return;
    }

    const list = document.createElement('div');
    list.className = 'task-list';

    filtered.forEach(task => {
      const card = document.createElement('div');
      card.className = 'task-card' + (task.status === 'complete' ? ' done' : '');
      card.dataset.id = task.id;

      const assignedDate = task.created_at
        ? new Date(task.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })
        : '';

      card.innerHTML = `
        <div class="task-card-body">
          <div class="task-meta">
            <div class="task-from">From ${esc(fromName(task))}</div>
            ${task.due ? `<div class="task-due">${esc(task.due)}</div>` : ''}
          </div>
          <div class="task-text">${esc(task.task)}</div>
          ${assignedDate ? `<div class="task-date">Assigned ${assignedDate}</div>` : ''}
        </div>
        <div class="task-card-footer">
          <button class="complete-btn" data-id="${task.id}">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Mark Complete
          </button>
          <div class="done-label">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Done
          </div>
        </div>
      `;

      if (task.status !== 'complete') {
        card.querySelector('.complete-btn').addEventListener('click', () => openCompleteModal(task));
      }

      list.appendChild(card);
    });

    content.innerHTML = '';
    content.appendChild(list);
  }

  // ── COMPLETE MODAL ──
  function openCompleteModal(task) {
    pendingCompleteId = task.id;
    document.getElementById('modalTaskPreview').textContent = task.task;
    document.getElementById('modalOverlay').classList.add('show');
  }

  document.getElementById('modalCancel').addEventListener('click', () => {
    document.getElementById('modalOverlay').classList.remove('show');
    pendingCompleteId = null;
  });

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('show');
      pendingCompleteId = null;
    }
  });

  document.getElementById('modalConfirm').addEventListener('click', async () => {
    if (!pendingCompleteId) return;
    const btn = document.getElementById('modalConfirm');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      const res = await fetch('/.netlify/functions/complete-task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskId: pendingCompleteId, assigneeKey, assigneeName: displayName })
      });

      const data = await res.json();

      if (!res.ok) {
        showToast(data.error || 'Could not complete task. Try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Mark Complete';
        return;
      }

      // Update local state
      const task = allTasks.find(t => t.id === pendingCompleteId);
      if (task) task.status = 'complete';

      document.getElementById('modalOverlay').classList.remove('show');
      pendingCompleteId = null;
      btn.disabled = false;
      btn.textContent = 'Mark Complete';

      showToast('Done! Lex has been notified.', 'success');
      renderTasks();

    } catch (err) {
      console.error(err);
      showToast('Something went wrong. Try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Mark Complete';
    }
  });

  // ── REFRESH ──
  document.getElementById('refreshBtn').addEventListener('click', loadTasks);

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function fromName(task) {
    const k = (task.assigned_by || 'lex').toLowerCase();
    if (k === assigneeKey) return 'Yourself';
    return k.charAt(0).toUpperCase() + k.slice(1);
  }

  loadTasks();
</script>
</body>
</html>
