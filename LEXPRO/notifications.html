<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<title>LexPro | Notifications</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; background: #0a0f1e; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; }

  .topbar { background: #111827; border-bottom: 1px solid #1e2d40; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .back-btn { width: 36px; height: 36px; background: #0a0f1e; border: 1px solid #1e2d40; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; }
  .back-btn svg { width: 16px; height: 16px; stroke: #8a9bb0; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-title { font-size: 18px; font-weight: 600; color: #fff; flex: 1; }
  .mark-all { font-size: 13px; color: #2d9e6e; cursor: pointer; }

  .content { flex: 1; overflow-y: auto; padding: 12px 16px 40px; }

  .notif-card {
    background: #111827; border: 1px solid #1e2d40;
    border-radius: 14px; padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; gap: 12px; align-items: flex-start;
    position: relative;
  }
  .notif-card.unread { border-left: 3px solid #2d9e6e; }
  .notif-card.unread.high { border-left-color: #ef4444; }

  .notif-tappable { display: flex; gap: 12px; align-items: flex-start; flex: 1; cursor: pointer; }
  .notif-tappable:active { opacity: 0.7; }

  .notif-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 18px;
  }
  .notif-icon.closing { background: rgba(239,68,68,0.15); }
  .notif-icon.clear_to_close { background: rgba(45,158,110,0.15); }
  .notif-icon.appraisal { background: rgba(55,138,221,0.15); }
  .notif-icon.inspection { background: rgba(245,158,11,0.15); }
  .notif-icon.listing { background: rgba(83,74,183,0.15); }
  .notif-icon.under_contract { background: rgba(45,158,110,0.15); }
  .notif-icon.new_contact { background: rgba(90,106,126,0.15); }
  .notif-icon.general { background: rgba(90,106,126,0.15); }

  .notif-body { flex: 1; }
  .notif-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; }
  .notif-text { font-size: 13px; color: #5a6a7e; }
  .notif-time { font-size: 11px; color: #2a3a50; margin-top: 4px; }

  .notif-right { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
  .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #2d9e6e; }
  .unread-dot.high { background: #ef4444; }

  .delete-btn { width: 28px; height: 28px; border-radius: 8px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .delete-btn:active { background: rgba(239,68,68,0.25); }
  .delete-btn svg { width: 13px; height: 13px; stroke: #ef4444; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .empty-state { text-align: center; color: #2a3a50; font-size: 14px; padding: 80px 20px; }
  .skeleton { background: #111827; border: 1px solid #1e2d40; border-radius: 14px; height: 70px; margin-bottom: 10px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(10,15,30,0.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .loading-overlay.open { display: flex; }
  .spinner { width: 28px; height: 28px; border: 3px solid rgba(45,158,110,0.3); border-top-color: #2d9e6e; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: #5a6a7e; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="home.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Notifications</div>
  <div class="mark-all" onclick="markAllRead()">Mark all read</div>
</div>

<div class="content" id="content">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Opening transaction...</div>
</div>

<script>
  const SUPABASE_URL = 'https://dqiiekdfmocvizzvmwlc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaWlla2RmbW9jdml6enZtd2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjcwOTcsImV4cCI6MjA5MTMwMzA5N30.Njm_nwlOJiHaapqeqj1ZhInkFUHiAqoglB5LuVauCwM';
  const GHL_API_KEY = 'pit-4e98487c-3f65-409c-a264-16352f97c01a';

  const user = JSON.parse(sessionStorage.getItem('lexpro_user') || '{}');
  if (!user.username) window.location.href = 'index.html';

  const TYPE_ICONS = {
    closing: '🏠', clear_to_close: '✅', appraisal: '📋',
    inspection: '🔍', listing: '📸', under_contract: '📝',
    new_contact: '👤', general: '🔔'
  };

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    if (hours < 24) return `${hours}h ago`;
    return `${days}d ago`;
  }

  async function loadNotifications() {
    const content = document.getElementById('content');
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/notifications?order=created_at.desc&limit=50`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const notifs = await res.json();
      content.innerHTML = '';

      if (!notifs || notifs.length === 0) {
        content.innerHTML = '<div class="empty-state">No notifications yet.<br>They\'ll appear here when GHL sends alerts.</div>';
        return;
      }

      notifs.forEach(n => {
        const isHigh = n.urgency === 'high';
        const icon = TYPE_ICONS[n.type] || '🔔';
        const card = document.createElement('div');
        card.className = `notif-card ${n.is_read ? '' : 'unread'} ${isHigh ? 'high' : ''}`;
        card.innerHTML = `
          <div class="notif-tappable" onclick="handleTap('${n.id}', this.closest('.notif-card'), '${n.ghl_contact_id || ''}', '${n.ghl_opportunity_id || ''}')">
            <div class="notif-icon ${n.type}">${icon}</div>
            <div class="notif-body">
              <div class="notif-title">${n.title}</div>
              <div class="notif-text">${n.body || ''}</div>
              <div class="notif-time">${timeAgo(n.created_at)}</div>
            </div>
          </div>
          <div class="notif-right">
            ${!n.is_read ? `<div class="unread-dot ${isHigh ? 'high' : ''}"></div>` : ''}
            <div class="delete-btn" onclick="deleteNotif('${n.id}', this.closest('.notif-card'))">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            </div>
          </div>
        `;
        content.appendChild(card);
      });
    } catch(e) {
      content.innerHTML = '<div class="empty-state">Could not load notifications.</div>';
    }
  }

  async function handleTap(id, card, contactId, oppId) {
    // Mark as read
    await fetch(`${SUPABASE_URL}/rest/v1/notifications?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ is_read: true })
    });
    card.classList.remove('unread', 'high');
    card.querySelector('.unread-dot')?.remove();

    // If we have an opportunity ID, fetch it and go to transaction
    if (oppId && oppId !== 'null' && oppId !== '') {
      await openTransaction(oppId);
      return;
    }

    // If we have a contact ID, look up their opportunity first
    if (contactId && contactId !== 'null' && contactId !== '') {
      await openTransactionByContact(contactId);
      return;
    }
  }

  async function openTransaction(oppId) {
    document.getElementById('loadingOverlay').classList.add('open');
    try {
      const res = await fetch(`https://services.leadconnectorhq.com/opportunities/${oppId}`, {
        headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
      });
      const data = await res.json();
      const opp = data.opportunity || data;
      if (opp && opp.id) {
        sessionStorage.setItem('lexpro_opp', JSON.stringify(opp));
        const side = detectSide(opp);
        window.location.href = `transaction.html?id=${opp.id}&side=${side}`;
      } else {
        document.getElementById('loadingOverlay').classList.remove('open');
        alert('Could not load transaction.');
      }
    } catch(e) {
      document.getElementById('loadingOverlay').classList.remove('open');
      alert('Could not load transaction.');
    }
  }

  async function openTransactionByContact(contactId) {
    document.getElementById('loadingOverlay').classList.add('open');
    try {
      const res = await fetch(`https://services.leadconnectorhq.com/contacts/${contactId}/opportunities`, {
        headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
      });
      const data = await res.json();
      const opps = data.opportunities || [];
      const opp = opps.find(o => o.status === 'open') || opps[0];
      if (opp) {
        sessionStorage.setItem('lexpro_opp', JSON.stringify(opp));
        const side = detectSide(opp);
        window.location.href = `transaction.html?id=${opp.id}&side=${side}`;
      } else {
        document.getElementById('loadingOverlay').classList.remove('open');
        alert('No active transaction found for this contact.');
      }
    } catch(e) {
      document.getElementById('loadingOverlay').classList.remove('open');
      alert('Could not load transaction.');
    }
  }

  function detectSide(opp) {
    const BUYER_PIPELINE = 'wc3q7QgK9U0FymB5jQp0';
    return opp.pipelineId === BUYER_PIPELINE ? 'buyer' : 'seller';
  }

  async function deleteNotif(id, card) {
    card.style.opacity = '0.4';
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/notifications?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      card.remove();
      const content = document.getElementById('content');
      if (content.children.length === 0) {
        content.innerHTML = '<div class="empty-state">No notifications yet.<br>They\'ll appear here when GHL sends alerts.</div>';
      }
    } catch(e) {
      card.style.opacity = '1';
      alert('Could not delete notification.');
    }
  }

  async function markAllRead() {
    await fetch(`${SUPABASE_URL}/rest/v1/notifications?is_read=eq.false`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ is_read: true })
    });
    loadNotifications();
  }

  loadNotifications();
</script>
</body>
</html>
