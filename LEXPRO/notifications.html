<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | Notifications</title>
<style>
  :root {
    --bg:#ffffff;--surface:#f7f7f7;--surface-2:#f0f0f0;--border:#e8e8e8;
    --primary:#111111;--text:#111111;--text-muted:#666666;--text-hint:#999999;
    --urgent:#cc2233;--font:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
    --radius-sm:10px;--radius-md:14px;--radius-lg:20px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{min-height:100vh;background:var(--bg);font-family:var(--font);color:var(--text);display:flex;flex-direction:column;}
  .topbar{background:var(--primary);padding:16px 20px;display:flex;align-items:center;gap:12px;}
  .back-btn{width:36px;height:36px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
  .back-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .topbar-title{font-size:18px;font-weight:600;color:#fff;flex:1;letter-spacing:-0.2px;}
  .mark-all{font-size:13px;color:rgba(255,255,255,0.6);cursor:pointer;font-weight:500;}
  .content{flex:1;overflow-y:auto;padding:12px 16px 40px;}
  .notif-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
  .notif-card.unread{border-left:3px solid var(--primary);background:var(--bg);}
  .notif-card.unread.high{border-left-color:var(--urgent);}
  .notif-tappable{display:flex;gap:12px;align-items:flex-start;flex:1;cursor:pointer;}
  .notif-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;background:var(--surface-2);}
  .notif-body{flex:1;}
  .notif-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
  .notif-text{font-size:13px;color:var(--text-muted);line-height:1.4;}
  .notif-time{font-size:11px;color:var(--text-hint);margin-top:5px;}
  .notif-right{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;}
  .unread-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);}
  .unread-dot.high{background:var(--urgent);}
  .delete-btn{width:28px;height:28px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .delete-btn svg{width:13px;height:13px;stroke:var(--text-hint);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
  .empty-state{text-align:center;color:var(--text-hint);font-size:14px;padding:80px 20px;line-height:1.6;}
  .skeleton{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);height:70px;margin-bottom:10px;animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
</style>
</head>
<body>
<div class="topbar">
  <a class="back-btn" href="home.html"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
  <div class="topbar-title">Notifications</div>
  <div class="mark-all" onclick="markAllRead()">Mark all read</div>
</div>
<div class="content" id="content">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>
<script>
  const SUPABASE_URL='https://dqiiekdfmocvizzvmwlc.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaWlla2RmbW9jdml6enZtd2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjcwOTcsImV4cCI6MjA5MTMwMzA5N30.Njm_nwlOJiHaapqeqj1ZhInkFUHiAqoglB5LuVauCwM';

  const user=JSON.parse(sessionStorage.getItem('lexpro_user')||'{}');
  if(!user.username)window.location.href='index.html';

  const TYPE_ICONS={closing:'🏠',clear_to_close:'✅',appraisal:'📋',inspection:'🔍',listing:'📸',under_contract:'📝',new_contact:'👤',general:'🔔'};

  function timeAgo(dateStr){
    const diff=Date.now()-new Date(dateStr).getTime();
    const mins=Math.floor(diff/60000);
    const hours=Math.floor(diff/3600000);
    const days=Math.floor(diff/86400000);
    if(mins<1)return'Just now';
    if(mins<60)return mins+'m ago';
    if(hours<24)return hours+'h ago';
    return days+'d ago';
  }

  async function loadNotifications(){
    const content=document.getElementById('content');
    try{
      const res=await fetch(SUPABASE_URL+'/rest/v1/notifications?order=created_at.desc&limit=50',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
      const notifs=await res.json();
      content.innerHTML='';
      if(!notifs||notifs.length===0){content.innerHTML='<div class="empty-state">No notifications yet.</div>';return;}
      notifs.forEach(n=>{
        const isHigh=n.urgency==='high';
        const icon=TYPE_ICONS[n.type]||'🔔';
        const card=document.createElement('div');
        card.className='notif-card '+(n.is_read?'':'unread '+(isHigh?'high':''));
        const cid=n.ghl_contact_id||'';
        const oid=n.ghl_opportunity_id||'';
        card.innerHTML=`
          <div class="notif-tappable" onclick="handleTap('${n.id}',this.closest('.notif-card'),'${cid}','${oid}')">
            <div class="notif-icon">${icon}</div>
            <div class="notif-body">
              <div class="notif-title">${n.title}</div>
              <div class="notif-text">${n.body||''}</div>
              <div class="notif-time">${timeAgo(n.created_at)}</div>
            </div>
          </div>
          <div class="notif-right">
            ${!n.is_read?'<div class="unread-dot '+(isHigh?'high':'')+'"></div>':''}
            <div class="delete-btn" onclick="deleteNotif('${n.id}',this.closest('.notif-card'))">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            </div>
          </div>`;
        content.appendChild(card);
      });
    }catch(e){content.innerHTML='<div class="empty-state">Could not load notifications.</div>';}
  }

  async function handleTap(id,card,contactId,oppId){
    await fetch(SUPABASE_URL+'/rest/v1/notifications?id=eq.'+id,{method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({is_read:true})});
    card.classList.remove('unread','high');
    card.querySelector('.unread-dot')?.remove();
    if(oppId&&oppId!=='null'&&oppId!==''){window.location.href='transaction.html?id='+oppId+'&side=buyer';return;}
    if(contactId&&contactId!=='null'&&contactId!==''){window.location.href='contact.html?id='+contactId;return;}
  }

  async function deleteNotif(id,card){
    card.style.opacity='0.4';
    try{
      await fetch(SUPABASE_URL+'/rest/v1/notifications?id=eq.'+id,{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
      card.remove();
      const content=document.getElementById('content');
      if(content.children.length===0)content.innerHTML='<div class="empty-state">No notifications yet.</div>';
    }catch(e){card.style.opacity='1';}
  }

  async function markAllRead(){
    await fetch(SUPABASE_URL+'/rest/v1/notifications?is_read=eq.false',{method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({is_read:true})});
    loadNotifications();
  }

  loadNotifications();
</script>
</body>
</html>
