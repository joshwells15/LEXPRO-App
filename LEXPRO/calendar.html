<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<title>LexPro | Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; background: #0a0f1e; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; color: #fff; display: flex; flex-direction: column; }

  .topbar { background: #111827; border-bottom: 1px solid #1e2d40; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .back-btn { width: 36px; height: 36px; background: #0a0f1e; border: 1px solid #1e2d40; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; }
  .back-btn svg { width: 16px; height: 16px; stroke: #8a9bb0; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-title { font-size: 18px; font-weight: 600; color: #fff; flex: 1; }

  .calendar-header { background: #111827; border-bottom: 1px solid #1e2d40; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
  .month-label { font-size: 18px; font-weight: 700; color: #fff; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn { width: 36px; height: 36px; background: #0a0f1e; border: 1px solid #1e2d40; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .nav-btn svg { width: 16px; height: 16px; stroke: #8a9bb0; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  .day-labels { display: grid; grid-template-columns: repeat(7, 1fr); background: #111827; padding: 8px 12px 4px; border-bottom: 1px solid #1e2d40; }
  .day-label { text-align: center; font-size: 11px; font-weight: 600; color: #5a6a7e; text-transform: uppercase; letter-spacing: 0.5px; }

  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px 12px; gap: 4px; background: #111827; border-bottom: 1px solid #1e2d40; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; position: relative; }
  .cal-day.empty { cursor: default; }
  .cal-day.today .day-num { background: #2d9e6e; color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .cal-day.has-closing { cursor: pointer; }
  .day-num { font-size: 14px; color: #8a9bb0; line-height: 1; }
  .cal-day.other-month .day-num { color: #2a3a50; }
  .closing-dot { width: 6px; height: 6px; border-radius: 50%; background: #2d9e6e; margin-top: 3px; }
  .closing-dot.red { background: #ef4444; }
  .closing-dot.amber { background: #f59e0b; }
  .cal-day.selected { background: rgba(45,158,110,0.15); border: 1px solid rgba(45,158,110,0.3); }

  .events-section { flex: 1; overflow-y: auto; padding: 16px 16px 40px; }
  .events-title { font-size: 11px; font-weight: 600; color: #5a6a7e; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

  .event-card { background: #111827; border: 1px solid #1e2d40; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 14px; text-decoration: none; transition: transform 0.1s; }
  .event-card:active { transform: scale(0.98); }
  .event-date-box { width: 44px; height: 44px; border-radius: 10px; background: rgba(45,158,110,0.15); border: 1px solid rgba(45,158,110,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .event-date-box.red { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); }
  .event-date-box.amber { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3); }
  .event-month { font-size: 9px; font-weight: 700; color: #2d9e6e; text-transform: uppercase; letter-spacing: 0.5px; }
  .event-date-box.red .event-month { color: #ef4444; }
  .event-date-box.amber .event-month { color: #f59e0b; }
  .event-day { font-size: 18px; font-weight: 700; color: #fff; line-height: 1; }
  .event-info { flex: 1; }
  .event-name { font-size: 15px; font-weight: 600; color: #fff; }
  .event-address { font-size: 12px; color: #5a6a7e; margin-top: 2px; }
  .event-countdown { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; margin-top: 4px; display: inline-block; }
  .event-countdown.green { background: rgba(45,158,110,0.15); color: #2d9e6e; }
  .event-countdown.amber { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .event-countdown.red { background: rgba(239,68,68,0.15); color: #ef4444; }

  .empty-state { text-align: center; color: #2a3a50; font-size: 14px; padding: 40px 20px; }
  .skeleton { background: #111827; border: 1px solid #1e2d40; border-radius: 14px; height: 72px; margin-bottom: 10px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="home.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Closing Calendar</div>
</div>

<div class="calendar-header">
  <div class="month-label" id="monthLabel">April 2026</div>
  <div class="nav-btns">
    <div class="nav-btn" onclick="changeMonth(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="nav-btn" onclick="changeMonth(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
</div>

<div class="day-labels">
  <div class="day-label">Sun</div>
  <div class="day-label">Mon</div>
  <div class="day-label">Tue</div>
  <div class="day-label">Wed</div>
  <div class="day-label">Thu</div>
  <div class="day-label">Fri</div>
  <div class="day-label">Sat</div>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

<div class="events-section">
  <div class="events-title" id="eventsTitle">Upcoming Closings</div>
  <div id="eventsList">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script>
  const GHL_API_KEY = 'pit-4e98487c-3f65-409c-a264-16352f97c01a';
  const GHL_LOCATION_ID = 'R5PobkV1CRO23kz95yYB';
  const BUYER_PIPELINE = 'yrXgfxFIAGqdUoqLNNMc';
  const SELLER_PIPELINE = 'vvTfRute8i8HmIdqq4Jf';
  const CLOSING_FIELD_ID = 'VKAdUOcBt1yvLiVyHFPT';
  const BUYER_STAGE_MAP = {
    '21e2d499-cb72-4c14-8bde-7d569265e9ad': 'Buyer Docs Signed',
    'c7c87055-b8ff-4698-8603-bf60fb4491a4': 'Showing Homes',
    '78f5bc45-e717-4807-9658-42e00795a58a': 'Under Contract',
    'adcf4d61-22e9-44d3-9da7-dcf301f027c8': 'Inspection Period',
    '3f9115af-147c-465c-97a1-ac8bd2558b4b': 'Appraisal and Financing Period',
    '3f20354e-a05d-46b3-bc0a-27c480c17438': 'Clear To Close',
    '6f2a71ab-014b-44b3-9b88-6c37d9d8ea55': 'Closed'
  };
  const SELLER_STAGE_MAP = {
    '7ddc8f53-2c74-4c31-a771-43852e5dff65': 'Seller Docs Signed',
    'f81dfac1-934e-4459-a070-1680b46b1721': 'Listing Photos Scheduled',
    'ba7f6a56-deec-4c17-89a9-28ed26fd68f1': 'Listing Photos Taken',
    '79d72912-e678-4d4b-94f8-0c4f3d60da12': 'Listing Live',
    '0a71c4b0-12a5-4c07-a2a9-3b02ab02c564': 'Under Contract',
    '368ed270-2806-429a-9fc8-c9e0e87c4aea': 'Inspection Period',
    '434c63a0-a3b9-42cd-add0-e2fee4e9a94f': 'Clear To Close',
    'df0ea83b-e535-4b42-a754-19d34f8050ae': 'Closed'
  };

  const user = JSON.parse(sessionStorage.getItem('lexpro_user') || '{}');
  if (!user.username) window.location.href = 'index.html';

  let currentDate = new Date();
  let allClosings = [];
  let selectedDate = null;

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function getDaysUntil(dateStr) {
    if (!dateStr) return null;
    return Math.ceil((new Date(dateStr).getTime() - Date.now()) / 86400000);
  }

  function getCountdownClass(days) {
    if (days === null) return 'green';
    if (days <= 7) return 'red';
    if (days <= 14) return 'amber';
    return 'green';
  }

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    const closingDates = {};
    allClosings.forEach(c => {
      if (!c.closingDate) return;
      const d = new Date(c.closingDate);
      if (d.getFullYear() === year && d.getMonth() === month) {
        const key = d.getDate();
        if (!closingDates[key]) closingDates[key] = [];
        closingDates[key].push(c);
      }
    });

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
      const hasClosing = closingDates[d];
      const isSelected = selectedDate === d;

      cell.className = `cal-day${isToday ? ' today' : ''}${hasClosing ? ' has-closing' : ''}${isSelected ? ' selected' : ''}`;

      const dayNum = document.createElement('div');
      dayNum.className = 'day-num';
      dayNum.textContent = d;
      cell.appendChild(dayNum);

      if (hasClosing) {
        const days = getDaysUntil(hasClosing[0].closingDate);
        const dot = document.createElement('div');
        dot.className = `closing-dot ${getCountdownClass(days)}`;
        cell.appendChild(dot);

        cell.onclick = () => {
          selectedDate = d;
          renderCalendar();
          showDayEvents(closingDates[d], d, month, year);
        };
      }

      grid.appendChild(cell);
    }
  }

  function showDayEvents(closings, day, month, year) {
    const d = new Date(year, month, day);
    document.getElementById('eventsTitle').textContent = `${MONTHS[month]} ${day} — ${closings.length} Closing${closings.length !== 1 ? 's' : ''}`;
    renderEventsList(closings);
  }

  function renderEventsList(closings) {
    const list = document.getElementById('eventsList');
    if (!closings || closings.length === 0) {
      list.innerHTML = '<div class="empty-state">No closings this month.</div>';
      return;
    }

    closings.sort((a, b) => new Date(a.closingDate) - new Date(b.closingDate));

    list.innerHTML = closings.map(c => {
      const d = new Date(c.closingDate);
      const days = getDaysUntil(c.closingDate);
      const cls = getCountdownClass(days);
      const month = SHORT_MONTHS[d.getMonth()];
      const day = d.getDate();
      const label = days === null ? '' : days === 0 ? 'Today' : days < 0 ? `${Math.abs(days)}d overdue` : `${days}d to close`;

      return `<a class="event-card" href="transaction.html?id=${c.oppId}&side=${c.side}" onclick="sessionStorage.setItem('lexpro_opp', JSON.stringify(${JSON.stringify(c.oppData).replace(/'/g, "\\'")}))">
        <div class="event-date-box ${cls}">
          <div class="event-month">${month}</div>
          <div class="event-day">${day}</div>
        </div>
        <div class="event-info">
          <div class="event-name">${c.contactName}</div>
          <div class="event-address">${c.address || c.side === 'buyer' ? 'Buyer' : 'Seller'}</div>
          ${label ? `<div class="event-countdown ${cls}">${label}</div>` : ''}
        </div>
        <svg style="width:16px;height:16px;stroke:#2a3a50;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </a>`;
    }).join('');
  }

  function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    selectedDate = null;
    document.getElementById('eventsTitle').textContent = 'Upcoming Closings';
    renderCalendar();
    showUpcoming();
  }

  function showUpcoming() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const monthClosings = allClosings.filter(c => {
      if (!c.closingDate) return false;
      const d = new Date(c.closingDate);
      return d.getFullYear() === year && d.getMonth() === month;
    });
    renderEventsList(monthClosings);
  }

  async function loadClosings() {
    try {
      const [buyerRes, sellerRes] = await Promise.all([
        fetch(`https://services.leadconnectorhq.com/opportunities/search?location_id=${GHL_LOCATION_ID}&pipeline_id=${BUYER_PIPELINE}&limit=100`, {
          headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
        }).then(r => r.json()),
        fetch(`https://services.leadconnectorhq.com/opportunities/search?location_id=${GHL_LOCATION_ID}&pipeline_id=${SELLER_PIPELINE}&limit=100`, {
          headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
        }).then(r => r.json())
      ]);

      const buyerOpps = (buyerRes.opportunities || []).map(o => ({ ...o, side: 'buyer' }));
      const sellerOpps = (sellerRes.opportunities || []).map(o => ({ ...o, side: 'seller' }));
      const allOpps = [...buyerOpps, ...sellerOpps].filter(o => o.status !== 'lost');

      const closings = await Promise.all(allOpps.map(async opp => {
        const contactId = opp.contactId || opp.contact?.id;
        if (!contactId) return null;
        try {
          const res = await fetch(`https://services.leadconnectorhq.com/contacts/${contactId}`, {
            headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
          });
          const data = await res.json();
          const cf = data.contact?.customFields || [];
          const closingField = cf.find(f => f.id === CLOSING_FIELD_ID);
          if (!closingField?.value) return null;

          const stageMap = opp.side === 'buyer' ? BUYER_STAGE_MAP : SELLER_STAGE_MAP;
          const streetId = opp.side === 'buyer' ? 'UbWD9ClprLSo3iABNqDm' : 'jUrEI5UBPdfZj2mWujx7';
          const streetField = cf.find(f => f.id === streetId);

          return {
            oppId: opp.id,
            side: opp.side,
            contactName: opp.contact?.name || opp.name || 'Unknown',
            closingDate: closingField.value,
            address: streetField?.value || null,
            stage: stageMap[opp.pipelineStageId] || '—',
            oppData: opp
          };
        } catch(e) { return null; }
      }));

      allClosings = closings.filter(Boolean);
      renderCalendar();
      showUpcoming();

    } catch(e) {
      document.getElementById('eventsList').innerHTML = '<div class="empty-state">Could not load closings.</div>';
    }
  }

  loadClosings();
</script>
</body>
</html>
