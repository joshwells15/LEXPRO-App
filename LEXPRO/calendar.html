<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | Calendar</title>
<style>
  :root {
    --bg:           #ffffff;
    --surface:      #f7f7f7;
    --surface-2:    #f0f0f0;
    --border:       #e8e8e8;
    --primary:      #111111;
    --text:         #111111;
    --text-muted:   #666666;
    --text-hint:    #999999;
    --font:         'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-sm:    10px;
    --radius-md:    14px;
    --radius-lg:    20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; background: var(--bg); font-family: var(--font); color: var(--text); display: flex; flex-direction: column; }

  /* ── Top Bar ── */
  .topbar { background: var(--primary); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .back-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; }
  .back-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-title { font-size: 18px; font-weight: 600; color: #fff; flex: 1; letter-spacing: -0.2px; }

  /* ── Calendar Header ── */
  .calendar-header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .month-label { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn { width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; }
  .nav-btn:active { background: var(--surface-2); }
  .nav-btn svg { width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Day Labels ── */
  .day-labels { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--surface); padding: 8px 12px 4px; border-bottom: 1px solid var(--border); }
  .day-label { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── Calendar Grid ── */
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px 12px; gap: 4px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; position: relative; }
  .cal-day.empty { cursor: default; }
  .cal-day.today .day-num { background: var(--primary); color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
  .day-num { font-size: 14px; color: var(--text-muted); line-height: 1; }
  .cal-day.other-month .day-num { color: var(--text-hint); }
  .cal-day.selected { background: var(--surface-2); border-radius: 8px; }
  .dots-row { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 2px; max-width: 100%; }
  .closing-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* ── Legend ── */
  .legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── Events ── */
  .events-section { flex: 1; overflow-y: auto; padding: 16px 16px 40px; }
  .events-title { font-size: 10px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 12px; }

  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 14px; text-decoration: none; transition: transform 0.1s, background 0.15s; }
  .event-card:active { transform: scale(0.98); background: var(--surface-2); }

  .event-date-box { width: 44px; height: 44px; border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
  .event-month { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .event-day { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }

  .event-info { flex: 1; }
  .event-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .event-address { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
  .event-type-label { font-size: 10px; font-weight: 700; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
  .event-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 4px; display: inline-block; }

  .empty-state { text-align: center; color: var(--text-hint); font-size: 14px; padding: 40px 20px; }
  .skeleton { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); height: 72px; margin-bottom: 10px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="home.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Closing Calendar</div>
</div>

<div class="calendar-header">
  <div class="month-label" id="monthLabel">April 2026</div>
  <div class="nav-btns">
    <div class="nav-btn" onclick="changeMonth(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="nav-btn" onclick="changeMonth(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
</div>

<div class="day-labels">
  <div class="day-label">Sun</div>
  <div class="day-label">Mon</div>
  <div class="day-label">Tue</div>
  <div class="day-label">Wed</div>
  <div class="day-label">Thu</div>
  <div class="day-label">Fri</div>
  <div class="day-label">Sat</div>
</div>

<div class="legend" id="legend"></div>
<div class="calendar-grid" id="calendarGrid"></div>

<div class="events-section">
  <div class="events-title" id="eventsTitle">Upcoming Closings</div>
  <div id="eventsList">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script>
  const GHL_API_KEY = 'pit-4e98487c-3f65-409c-a264-16352f97c01a';
  const GHL_LOCATION_ID = 'R5PobkV1CRO23kz95yYB';
  const BUYER_PIPELINE = 'yrXgfxFIAGqdUoqLNNMc';
  const SELLER_PIPELINE = 'vvTfRute8i8HmIdqq4Jf';
  const CLOSING_FIELD_ID = 'VKAdUOcBt1yvLiVyHFPT';

  const EVENT_TYPES = [
    { id: 'VKAdUOcBt1yvLiVyHFPT', label: 'Closing', color: '#111111' },
    { id: 'RtJ0V9Iw3qhPDhFkn3kF', label: 'Inspection Notice', color: '#b86e00' },
    { id: 'qiiGsLo06Q3cZDToZPjf', label: 'Inspection Response', color: '#cc2233' },
    { id: 'MagnsA9FrA1h75rSVqAX', label: 'Appraisal', color: '#185fa5' },
    { id: 'Ui594kueuQlieHIH2Zb7', label: 'Final Walkthrough', color: '#534ab7' },
    { id: 'XY6ih9V1puuc6iuAfz39', label: 'Listing Live', color: '#993c1d' },
    { id: 'NheQXQlHnsYCfW3azy5A', label: 'Under Contract', color: '#0f6e56' },
    { id: 'UByID7VDqXAvHDYGxmfk', label: 'Notice Submitted', color: '#854f0b' }
  ];

  const BUYER_STAGE_MAP = {
    '21e2d499-cb72-4c14-8bde-7d569265e9ad': 'Buyer Docs Signed',
    'c7c87055-b8ff-4698-8603-bf60fb4491a4': 'Showing Homes',
    '78f5bc45-e717-4807-9658-42e00795a58a': 'Under Contract',
    'adcf4d61-22e9-44d3-9da7-dcf301f027c8': 'Inspection Period',
    '3f9115af-147c-465c-97a1-ac8bd2558b4b': 'Appraisal and Financing Period',
    '3f20354e-a05d-46b3-bc0a-27c480c17438': 'Clear To Close',
    '6f2a71ab-014b-44b3-9b88-6c37d9d8ea55': 'Closed'
  };
  const SELLER_STAGE_MAP = {
    '7ddc8f53-2c74-4c31-a771-43852e5dff65': 'Seller Docs Signed',
    'f81dfac1-934e-4459-a070-1680b46b1721': 'Listing Photos Scheduled',
    'ba7f6a56-deec-4c17-89a9-28ed26fd68f1': 'Listing Photos Taken',
    '79d72912-e678-4d4b-94f8-0c4f3d60da12': 'Listing Live',
    '0a71c4b0-12a5-4c07-a2a9-3b02ab02c564': 'Under Contract',
    '368ed270-2806-429a-9fc8-c9e0e87c4aea': 'Inspection Period',
    '434c63a0-a3b9-42cd-add0-e2fee4e9a94f': 'Clear To Close',
    'df0ea83b-e535-4b42-a754-19d34f8050ae': 'Closed'
  };

  const user = JSON.parse(sessionStorage.getItem('lexpro_user') || '{}');
  if (!user.username) window.location.href = 'index.html';

  let currentDate = new Date();
  let allClosings = [];
  let selectedDate = null;

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function getDaysUntil(dateStr) {
    if (!dateStr) return null;
    return Math.ceil((new Date(dateStr).getTime() - Date.now()) / 86400000);
  }

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    const closingDates = {};
    allClosings.forEach(c => {
      if (!c.eventDate) return;
      const d = new Date(c.eventDate);
      if (d.getFullYear() === year && d.getMonth() === month) {
        const key = d.getDate();
        if (!closingDates[key]) closingDates[key] = [];
        closingDates[key].push(c);
      }
    });

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
      const hasClosing = closingDates[d];
      const isSelected = selectedDate === d;
      cell.className = `cal-day${isToday ? ' today' : ''}${hasClosing ? ' has-closing' : ''}${isSelected ? ' selected' : ''}`;

      const dayNum = document.createElement('div');
      dayNum.className = 'day-num';
      dayNum.textContent = d;
      cell.appendChild(dayNum);

      if (hasClosing) {
        const dotsRow = document.createElement('div');
        dotsRow.className = 'dots-row';
        hasClosing.slice(0, 4).forEach(ev => {
          const dot = document.createElement('div');
          dot.className = 'closing-dot';
          dot.style.background = ev.eventColor;
          dotsRow.appendChild(dot);
        });
        cell.appendChild(dotsRow);
        cell.onclick = () => {
          selectedDate = d;
          renderCalendar();
          showDayEvents(closingDates[d], d, month, year);
        };
      }

      grid.appendChild(cell);
    }
  }

  function showDayEvents(closings, day, month, year) {
    document.getElementById('eventsTitle').textContent = `${MONTHS[month]} ${day} — ${closings.length} event${closings.length !== 1 ? 's' : ''}`;
    renderEventsList(closings);
  }

  function navigateToOpp(idx) {
    const c = window._currentClosings[idx];
    if (!c) return;
    sessionStorage.setItem('lexpro_opp', JSON.stringify(c.oppData));
    window.location.href = 'transaction.html?id=' + c.oppId + '&side=' + c.side;
  }

  function renderEventsList(closings) {
    const list = document.getElementById('eventsList');
    if (!closings || closings.length === 0) {
      list.innerHTML = '<div class="empty-state">No events this month.</div>';
      return;
    }

    closings.sort((a, b) => new Date(a.eventDate) - new Date(b.eventDate));

    list.innerHTML = closings.map((c, i) => {
      const d = new Date(c.eventDate);
      const days = getDaysUntil(c.eventDate);
      const mon = SHORT_MONTHS[d.getMonth()];
      const day = d.getDate();
      const label = days === null ? '' : days === 0 ? 'Today' : days < 0 ? `${Math.abs(days)}d ago` : `in ${days}d`;
      const badgeBg = days !== null && days <= 7 ? 'rgba(204,34,51,0.08)' : days !== null && days <= 14 ? 'rgba(184,110,0,0.08)' : 'rgba(17,17,17,0.06)';
      const badgeColor = days !== null && days <= 7 ? '#cc2233' : days !== null && days <= 14 ? '#b86e00' : '#666666';
      return `<div class="event-card" onclick="navigateToOpp(${i})">
        <div class="event-date-box" style="background:${c.eventColor}14;border:1px solid ${c.eventColor}33;">
          <div class="event-month" style="color:${c.eventColor}">${mon}</div>
          <div class="event-day">${day}</div>
        </div>
        <div class="event-info">
          <div class="event-name">${c.contactName}</div>
          <div class="event-type-label" style="color:${c.eventColor}">${c.eventType}</div>
          ${c.address ? `<div class="event-address">${c.address}</div>` : ''}
          ${label ? `<div class="event-badge" style="background:${badgeBg};color:${badgeColor}">${label}</div>` : ''}
        </div>
        <svg style="width:16px;height:16px;stroke:#cccccc;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    }).join('');

    // Store current closings list for onclick navigation
    window._currentClosings = closings;
  }

  function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    selectedDate = null;
    document.getElementById('eventsTitle').textContent = 'Upcoming Events';
    renderCalendar();
    showUpcoming();
  }

  function showUpcoming() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const monthClosings = allClosings.filter(c => {
      if (!c.eventDate) return false;
      const d = new Date(c.eventDate);
      return d.getFullYear() === year && d.getMonth() === month;
    });
    renderEventsList(monthClosings);
  }

  function buildLegend() {
    const legend = document.getElementById('legend');
    legend.innerHTML = EVENT_TYPES.map(t =>
      `<div class="legend-item"><div class="legend-dot" style="background:${t.color}"></div>${t.label}</div>`
    ).join('');
  }

  async function loadClosings() {
    buildLegend();
    try {
      const [buyerRes, sellerRes] = await Promise.all([
        fetch(`https://services.leadconnectorhq.com/opportunities/search?location_id=${GHL_LOCATION_ID}&pipeline_id=${BUYER_PIPELINE}&limit=100`, {
          headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
        }).then(r => r.json()),
        fetch(`https://services.leadconnectorhq.com/opportunities/search?location_id=${GHL_LOCATION_ID}&pipeline_id=${SELLER_PIPELINE}&limit=100`, {
          headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
        }).then(r => r.json())
      ]);

      const buyerOpps = (buyerRes.opportunities || []).map(o => ({ ...o, side: 'buyer' }));
      const sellerOpps = (sellerRes.opportunities || []).map(o => ({ ...o, side: 'seller' }));
      const allOpps = [...buyerOpps, ...sellerOpps].filter(o => o.status !== 'lost');

      const events = await Promise.all(allOpps.map(async opp => {
        const contactId = opp.contactId || opp.contact?.id;
        if (!contactId) return [];
        try {
          const res = await fetch(`https://services.leadconnectorhq.com/contacts/${contactId}`, {
            headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' }
          });
          const data = await res.json();
          const cf = data.contact?.customFields || [];
          const streetId = opp.side === 'buyer' ? 'UbWD9ClprLSo3iABNqDm' : 'jUrEI5UBPdfZj2mWujx7';
          const streetField = cf.find(f => f.id === streetId);
          const contactName = opp.contact?.name || opp.name || 'Unknown';
          const address = streetField?.value || null;

          const oppEvents = [];
          EVENT_TYPES.forEach(et => {
            const field = cf.find(f => f.id === et.id);
            if (field?.value) {
              oppEvents.push({
                oppId: opp.id,
                side: opp.side,
                contactName,
                address,
                eventDate: field.value,
                eventType: et.label,
                eventColor: et.color,
                oppData: opp,
                isClosing: et.id === CLOSING_FIELD_ID
              });
            }
          });
          return oppEvents;
        } catch(e) { return []; }
      }));

      allClosings = events.flat().filter(Boolean);
      renderCalendar();
      showUpcoming();

    } catch(e) {
      document.getElementById('eventsList').innerHTML = '<div class="empty-state">Could not load events.</div>';
    }
  }

  loadClosings();
</script>
</body>
</html>
