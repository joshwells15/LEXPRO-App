<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | Team Chat</title>
<style>
  :root {
    --bg: #ffffff; --surface: #f7f7f7; --surface-2: #f0f0f0; --border: #e8e8e8;
    --primary: #111111; --text: #111111; --text-muted: #666666; --text-hint: #999999;
    --font: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-sm: 10px; --radius-md: 14px; --radius-lg: 20px;
    --tanya: #7C3AED; --justin: #0369A1; --josh: #065F46;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    height: 100vh; height: 100dvh;
    background: var(--bg); font-family: var(--font); color: var(--text);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* TOPBAR */
  .topbar {
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    flex-shrink: 0; z-index: 10;
  }

  .back-btn {
    width: 34px; height: 34px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
    text-decoration: none; flex-shrink: 0;
  }

  .back-btn svg { width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .topbar-info { flex: 1; min-width: 0; }
  .topbar-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .topbar-sub { font-size: 11px; color: var(--text-hint); margin-top: 1px; }

  .clear-btn {
    font-size: 12px; color: var(--text-hint); background: none; border: none;
    font-family: var(--font); cursor: pointer; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: var(--radius-sm); flex-shrink: 0;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  /* EMPTY STATE */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px 24px; gap: 16px;
  }

  .empty-icon {
    width: 56px; height: 56px; background: var(--surface); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .empty-icon svg { width: 24px; height: 24px; stroke: var(--text-hint); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .empty-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: 13px; color: var(--text-hint); line-height: 1.6; max-width: 260px; }

  .starter-pills { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 300px; }

  .starter-pill {
    padding: 11px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); font-family: var(--font); font-size: 13px;
    color: var(--text-muted); cursor: pointer; text-align: left; line-height: 1.4;
    transition: background 0.15s, border-color 0.15s;
  }

  .starter-pill:active { background: var(--surface-2); border-color: var(--primary); }

  /* MESSAGES */
  .msg-row { display: flex; flex-direction: column; gap: 2px; }

  .msg-bubble {
    max-width: 88%; padding: 12px 14px; border-radius: 18px; font-size: 15px; line-height: 1.55;
    word-break: break-word;
  }

  .msg-bubble.lex {
    background: var(--primary); color: #ffffff; align-self: flex-end;
    border-bottom-right-radius: 6px;
  }

  .msg-bubble.claude {
    background: var(--surface); color: var(--text); align-self: flex-start;
    border-bottom-left-radius: 6px;
  }

  .msg-bubble.claude ul, .msg-bubble.claude ol {
    padding-left: 18px; margin-top: 6px; display: flex; flex-direction: column; gap: 4px;
  }

  .msg-bubble.claude li { font-size: 14px; line-height: 1.5; }
  .msg-bubble.claude strong { font-weight: 600; }
  .msg-bubble.claude p + p { margin-top: 8px; }

  .msg-label { font-size: 11px; color: var(--text-hint); padding: 0 4px; }
  .msg-label.right { text-align: right; }

  /* TYPING INDICATOR */
  .typing-bubble {
    background: var(--surface); padding: 12px 16px; border-radius: 18px;
    border-bottom-left-radius: 6px; display: flex; gap: 4px; align-items: center;
    align-self: flex-start;
  }

  .typing-dot {
    width: 7px; height: 7px; background: var(--text-hint); border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* TASK CONFIRMATION CARD (inside chat) */
  .task-confirm-card {
    align-self: flex-start; width: 100%; max-width: 340px;
    border: 1.5px solid var(--border); border-radius: var(--radius-lg);
    background: var(--bg); overflow: hidden;
  }

  .task-confirm-header {
    padding: 12px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
  }

  .task-confirm-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }

  .task-item { display: flex; flex-direction: column; gap: 4px; }

  .task-item-header { display: flex; align-items: center; gap: 8px; }

  .assignee-pill {
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
  }

  .pill-tanya { background: #EDE9FE; color: var(--tanya); }
  .pill-justin { background: #E0F2FE; color: var(--justin); }
  .pill-josh   { background: #D1FAE5; color: var(--josh); }
  .pill-lex    { background: #F3F4F6; color: #111; }

  .task-due-label { font-size: 11px; color: var(--text-hint); margin-left: auto; }

  .task-item-text { font-size: 14px; color: var(--text); line-height: 1.45; padding-left: 2px; }

  .task-sep { height: 1px; background: var(--border); }

  .task-confirm-actions { display: flex; border-top: 1px solid var(--border); }

  .task-action-btn {
    flex: 1; padding: 12px; font-family: var(--font); font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; background: none; transition: background 0.15s;
  }

  .task-action-btn:active { background: var(--surface); }
  .task-action-btn.cancel { color: var(--text-hint); border-right: 1px solid var(--border); }
  .task-action-btn.confirm { color: var(--primary); }

  /* INPUT BAR */
  .input-bar {
    padding: 10px 12px 10px; border-top: 1px solid var(--border);
    background: var(--bg); display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
  }

  .input-wrap {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 22px; display: flex; align-items: flex-end; padding: 2px 4px 2px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--primary); background: var(--bg); }

  .chat-input {
    flex: 1; background: none; border: none; outline: none; font-family: var(--font);
    font-size: 15px; color: var(--text); resize: none; max-height: 120px; padding: 9px 0;
    line-height: 1.4;
  }

  .chat-input::placeholder { color: var(--text-hint); }

  .mic-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none; background: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    flex-shrink: 0; margin-bottom: 3px; transition: background 0.2s;
    user-select: none; -webkit-user-select: none;
  }

  .mic-btn svg { width: 18px; height: 18px; stroke: var(--text-hint); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }

  .mic-btn.listening { background: #FEE2E2; animation: pulse 1.2s ease-in-out infinite; }
  .mic-btn.listening svg { stroke: #EF4444; }

  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.25); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }

  .send-btn {
    width: 40px; height: 40px; background: var(--primary); border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }

  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { background: var(--surface-2); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 17px; height: 17px; stroke: #ffffff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .send-btn:disabled svg { stroke: var(--text-hint); }

  /* DONE TOAST */
  .toast {
    display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #111; color: white; padding: 11px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500; z-index: 200; white-space: nowrap;
  }
  .toast.show { display: block; }
  .toast.success { background: #065F46; }
  .toast.error { background: #DC2626; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="home.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-info">
    <div class="topbar-title">Team Chat</div>
    <div class="topbar-sub" id="topbarSub">Chat with Claude · Assign to team</div>
  </div>
  <button class="clear-btn" id="clearBtn">Clear</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </div>
    <div class="empty-title" id="greetTitle">Hey there 👋</div>
    <div class="empty-sub">Ask Claude anything, or describe what needs to get done. When you're ready to assign, just say who gets what.</div>
    <div class="starter-pills">
      <button class="starter-pill" onclick="useStarter(this)">What are some creative ways to make this weekend's open house stand out?</button>
      <button class="starter-pill" onclick="useStarter(this)">Give me a follow-up plan for buyers who went quiet after their showings.</button>
      <button class="starter-pill" onclick="useStarter(this)">I need the signs picked up from the Main Street listing and new flyers made for the open house.</button>
    </div>
  </div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <textarea class="chat-input" id="chatInput" placeholder="Message Claude..." rows="1"></textarea>
    <button class="mic-btn" id="micBtn">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
  </div>
  <button class="send-btn" id="sendBtn" disabled>
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const ASSIGNEES = {
    tanya:  { name: 'Tanya',  phone: '+14178802014', pillClass: 'pill-tanya', docId: '1y-t-gM-5zlZkke0PNoSESmvxtEaMAl6dSxrDRDcEFBY' },
    justin: { name: 'Justin', phone: '+14178609896', pillClass: 'pill-justin', docId: '17Xpgn5OYbGD0AR69eXFhMOnOiN8virrudB85n2H5Aww' },
    josh:   { name: 'Josh',   phone: '+14178080046', pillClass: 'pill-josh',   docId: '1OCDEmoqQnUJrfsN5qPxjQqlqa1fwz8q7N25uPbk_tYM' },
    lex:    { name: 'Lex',    phone: '+13605183555', pillClass: 'pill-lex',    docId: '1_8AnabstJh8DyrH_U3jczvL55a1VRtzye0fPe-LXtPE'  },
  };

  let conversationHistory = [];
  let isThinking = false;

  const chatArea   = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const chatInput  = document.getElementById('chatInput');
  const sendBtn    = document.getElementById('sendBtn');
  const micBtn     = document.getElementById('micBtn');
  const toast      = document.getElementById('toast');

  // ── LOGGED-IN USER ──
  function getLoggedInUser() {
    const keys = ['lexpro_user','lexproUser','username','user','currentUser','loggedInUser'];
    for (const k of keys) {
      const v = localStorage.getItem(k) || sessionStorage.getItem(k);
      if (!v) continue;
      try {
        const o = JSON.parse(v);
        const n = o.username || o.name || o.user;
        if (typeof n === 'string' && n.trim()) return n.trim();
      } catch (e) {
        if (typeof v === 'string' && v.trim() && v.length < 30) return v.trim();
      }
    }
    return 'Lex';
  }

  const rawUser = getLoggedInUser();
  const displayName = rawUser.charAt(0).toUpperCase() + rawUser.slice(1).toLowerCase();
  document.getElementById('greetTitle').textContent = 'Hey ' + displayName + ' \uD83D\uDC4B';

  // ── LOCATION (for local recommendations wherever the user is) ──
  let userCoords = null;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => { userCoords = { latitude: p.coords.latitude, longitude: p.coords.longitude }; },
      () => { /* denied or unavailable — server falls back to Springfield MO */ },
      { maximumAge: 600000, timeout: 8000 }
    );
  }

  // ── TOAST ──
  function showToast(msg, type='') {
    toast.textContent = msg;
    toast.className = 'toast show' + (type ? ' '+type : '');
    setTimeout(() => { toast.className = 'toast'; }, 3000);
  }

  // ── AUTO-RESIZE TEXTAREA ──
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = !chatInput.value.trim() || isThinking;
  });

  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
  });

  sendBtn.addEventListener('click', send);

  // ── STARTER PILLS ──
  function useStarter(btn) {
    chatInput.value = btn.textContent.trim();
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = false;
    chatInput.focus();
  }

  // ── VOICE TO TEXT ──
  let recognition = null, isListening = false;

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    let finalTranscript = '';

    recognition.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalTranscript += t + ' ';
        else interim = t;
      }
      chatInput.value = (finalTranscript + interim).trim();
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
      sendBtn.disabled = !chatInput.value.trim();
    };

    recognition.onerror = e => { micBtn.classList.remove('listening'); isListening = false; };
    recognition.onend   = () => { micBtn.classList.remove('listening'); isListening = false; };

    const startListen = () => {
      if (isListening || isThinking) return;
      finalTranscript = chatInput.value ? chatInput.value + ' ' : '';
      recognition.start(); isListening = true; micBtn.classList.add('listening');
    };

    const stopListen = () => { if (!isListening) return; recognition.stop(); };

    micBtn.addEventListener('touchstart', e => { e.preventDefault(); startListen(); }, { passive: false });
    micBtn.addEventListener('touchend',   e => { e.preventDefault(); stopListen(); },  { passive: false });
    micBtn.addEventListener('mousedown',  startListen);
    micBtn.addEventListener('mouseup',    stopListen);
  } else {
    micBtn.style.opacity = '0.3';
  }

  // ── RENDER HELPERS ──
  function hideEmpty() {
    const es = document.getElementById('emptyState');
    if (es && es.parentNode) es.remove();
  }

  function addMessage(role, content) {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'msg-row';

    const label = document.createElement('div');
    label.className = 'msg-label' + (role === 'lex' ? ' right' : '');
    label.textContent = role === 'lex' ? displayName : 'Claude';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + role;

    if (role === 'claude') {
      bubble.innerHTML = formatMarkdown(content);
    } else {
      bubble.textContent = content;
    }

    row.appendChild(label);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function formatMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^### (.+)$/gm, '<strong>$1</strong>')
      .replace(/^## (.+)$/gm, '<strong>$1</strong>')
      .replace(/^# (.+)$/gm, '<strong>$1</strong>')
      .replace(/^\d+\.\s+(.+)$/gm, (_, item) => `<div style="display:flex;gap:6px;margin-top:4px;"><span style="flex-shrink:0;color:var(--text-hint);">•</span><span>${item}</span></div>`)
      .replace(/^[-*]\s+(.+)$/gm, (_, item) => `<div style="display:flex;gap:6px;margin-top:4px;"><span style="flex-shrink:0;color:var(--text-hint);">•</span><span>${item}</span></div>`)
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.id = 'typingRow';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Claude';
    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    row.appendChild(label);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  function scrollBottom() {
    setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
  }

  // ── TASK CONFIRM CARD ──
  function showTaskCard(tasks) {
    hideEmpty();
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-row';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Claude';

    const card = document.createElement('div');
    card.className = 'task-confirm-card';

    const header = document.createElement('div');
    header.className = 'task-confirm-header';
    header.textContent = `${tasks.length} task${tasks.length > 1 ? 's' : ''} to assign`;
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'task-confirm-body';

    tasks.forEach((task, i) => {
      if (i > 0) { const sep = document.createElement('div'); sep.className = 'task-sep'; body.appendChild(sep); }
      const item = document.createElement('div');
      item.className = 'task-item';
      const assignee = ASSIGNEES[(task.assignee||'tanya').toLowerCase()] || ASSIGNEES.tanya;
      item.innerHTML = `
        <div class="task-item-header">
          <div class="assignee-pill ${assignee.pillClass}">${assignee.name}</div>
          ${task.due ? `<div class="task-due-label">${task.due}</div>` : ''}
        </div>
        <div class="task-item-text">${escHtml(task.task)}</div>
      `;
      body.appendChild(item);
    });

    card.appendChild(body);

    const actions = document.createElement('div');
    actions.className = 'task-confirm-actions';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'task-action-btn cancel';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => {
      wrapper.remove();
      addMessage('claude', 'No worries — tasks cancelled. Keep chatting or let me know when you\'re ready to assign.');
    });

    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'task-action-btn confirm';
    confirmBtn.textContent = 'Send to Team ›';
    confirmBtn.addEventListener('click', () => sendTasks(tasks, wrapper, confirmBtn));

    actions.appendChild(cancelBtn);
    actions.appendChild(confirmBtn);
    card.appendChild(actions);

    wrapper.appendChild(label);
    wrapper.appendChild(card);
    chatArea.appendChild(wrapper);
    scrollBottom();
  }

  // ── SEND TASKS ──
  async function sendTasks(tasks, cardWrapper, confirmBtn) {
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Sending...';

    try {
      const res = await fetch('/.netlify/functions/lex-intercom', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'send', tasks, user: rawUser })
      });

      const data = await res.json();

      if (!res.ok) {
        showToast('Send failed. Try again.', 'error');
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Send to Team ›';
        return;
      }

      cardWrapper.remove();
      const names = [...new Set(tasks.map(t => ASSIGNEES[(t.assignee||'').toLowerCase()]?.name || t.assignee))].join(', ');
      addMessage('claude', `Done! I've notified ${names} via SMS. They'll get a reminder at 9am tomorrow if the tasks aren't marked complete. Anything else?`);
      showToast('Tasks sent!', 'success');

    } catch (err) {
      console.error(err);
      showToast('Something went wrong.', 'error');
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Send to Team ›';
    }
  }

  // ── MAIN SEND ──
  async function send() {
    const msg = chatInput.value.trim();
    if (!msg || isThinking) return;

    addMessage('lex', msg);
    conversationHistory.push({ role: 'user', content: msg });

    chatInput.value = '';
    chatInput.style.height = 'auto';
    sendBtn.disabled = true;
    isThinking = true;
    showTyping();

    try {
      const res = await fetch('/.netlify/functions/lex-intercom', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'chat',
          history: conversationHistory,
          user: rawUser,
          location: userCoords
        })
      });

      const data = await res.json();
      hideTyping();
      isThinking = false;

      if (!res.ok) {
        addMessage('claude', 'Something went wrong on my end. Try again.');
        return;
      }

      // If tasks detected, show task card
      if (data.tasks && data.tasks.length > 0) {
        if (data.reply) addMessage('claude', data.reply);
        showTaskCard(data.tasks);
        conversationHistory.push({ role: 'assistant', content: data.reply || 'Here are the tasks I picked up:' });
      } else {
        addMessage('claude', data.reply || 'Got it.');
        conversationHistory.push({ role: 'assistant', content: data.reply || 'Got it.' });
      }

    } catch (err) {
      console.error(err);
      hideTyping();
      isThinking = false;
      addMessage('claude', 'Connection error. Check your signal and try again.');
    }

    sendBtn.disabled = !chatInput.value.trim();
  }

  // ── CLEAR ──
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (conversationHistory.length === 0) return;
    if (!confirm('Clear this conversation?')) return;
    conversationHistory = [];
    chatArea.innerHTML = '';
    const fresh = emptyState.cloneNode(true);
    chatArea.appendChild(fresh);
    const gt = fresh.querySelector('#greetTitle') || fresh.querySelector('.empty-title');
    if (gt) gt.textContent = 'Hey ' + displayName + ' \uD83D\uDC4B';
    fresh.querySelectorAll('.starter-pill').forEach(btn => {
      btn.addEventListener('click', () => useStarter(btn));
    });
  });

  function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
