<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | Command App</title>
<style>
  /* ── Design Tokens ── */
  :root {
    --bg:           #ffffff;
    --surface:      #f7f7f7;
    --surface-2:    #f0f0f0;
    --border:       #e8e8e8;
    --primary:      #111111;
    --text:         #111111;
    --text-muted:   #666666;
    --text-hint:    #888888;
    --accent:       #111111;
    --error-bg:     rgba(220,53,69,0.07);
    --error-border: rgba(220,53,69,0.2);
    --error-text:   #cc2233;
    --font:         'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-sm:    10px;
    --radius-md:    14px;
    --radius-lg:    20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Faint watermark behind everything */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 520px;
    height: 520px;
    background-image: url('/lexpro_gold_logo_rolex_best_.avif');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
  }

  /* ── Logo Mark ── */
  .brand {
    text-align: center;
    margin-bottom: 44px;
  }

  .brand-logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 10px;
  }

  .brand-lex {
    font-size: 36px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 4px;
    line-height: 1;
  }

  .brand-pro-box {
    border: 3px solid var(--primary);
    border-radius: 9px;
    padding: 3px 10px;
    margin-left: 7px;
    line-height: 1;
  }

  .brand-pro {
    font-size: 36px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 4px;
    line-height: 1;
    display: block;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--text-hint);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ── Card ── */
  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 15px;
    font-family: var(--font);
    color: var(--text);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    -webkit-appearance: none;
  }

  .field input::placeholder { color: #999999; }

  .field input:focus {
    border-color: var(--primary);
    background: var(--bg);
    box-shadow: 0 0 0 3px rgba(17,17,17,0.07);
  }

  .btn-login {
    width: 100%;
    margin-top: 10px;
    padding: 16px;
    background: var(--primary);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    color: #ffffff;
    cursor: pointer;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: opacity 0.18s, transform 0.1s;
  }

  .btn-login:active { transform: scale(0.98); opacity: 0.85; }
  .btn-login:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--error-text);
    text-align: center;
  }

  .error-msg.visible { display: block; }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <span class="brand-lex">LEX</span>
      <div class="brand-pro-box"><span class="brand-pro">PRO</span></div>
    </div>
    <div class="brand-sub">Real Estate Command</div>
  </div>

  <div class="card">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autocapitalize="none" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>
    <div class="error-msg" id="errorMsg">Incorrect username or password.</div>
  </div>

  <div class="footer-note">LexPro Real Estate &bull; Springfield, MO</div>
</div>

<script>
  const SUPABASE_URL = 'https://dqiiekdfmocvizzvmwlc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaWlla2RmbW9jdml6enZtd2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjcwOTcsImV4cCI6MjA5MTMwMzA5N30.Njm_nwlOJiHaapqeqj1ZhInkFUHiAqoglB5LuVauCwM';

  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function handleLogin() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    if (!username || !password) {
      err.textContent = 'Please enter your username and password.';
      err.classList.add('visible');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    err.classList.remove('visible');

    try {
      const hash = await sha256(password);

      const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(username)}&password_hash=eq.${hash}&select=id,username,role`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });

      const data = await res.json();

      if (data && data.length > 0) {
        const user = data[0];
        sessionStorage.setItem('lexpro_user', JSON.stringify(user));
        btn.innerHTML = 'Welcome back!';
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 800);
      } else {
        err.textContent = 'Incorrect username or password.';
        err.classList.add('visible');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    } catch (e) {
      err.textContent = 'Connection error. Please try again.';
      err.classList.add('visible');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });

  document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  const saved = sessionStorage.getItem('lexpro_user');
  if (saved) window.location.href = 'home.html';
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js');
    });
  }
</script>
</body>
</html>
