<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>LexPro | Command App</title>
<style>
  /* ── Design Tokens ── */
  :root {
    --bg:           #ffffff;
    --surface:      #f7f7f7;
    --surface-2:    #f0f0f0;
    --border:       #e8e8e8;
    --primary:      #111111;
    --text:         #111111;
    --text-muted:   #666666;
    --text-hint:    #888888;
    --accent:       #111111;
    --error-bg:     rgba(220,53,69,0.07);
    --error-border: rgba(220,53,69,0.2);
    --error-text:   #cc2233;
    --font:         'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius-sm:    10px;
    --radius-md:    14px;
    --radius-lg:    20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 520px;
    height: 520px;
    background-image: url('/lexpro_gold_logo_rolex_best_.avif');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
  }

  .brand { text-align: center; margin-bottom: 44px; }
  .brand-logo { display: inline-flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 10px; }
  .brand-lex { font-size: 36px; font-weight: 700; color: var(--primary); letter-spacing: 4px; line-height: 1; }
  .brand-pro-box { border: 3px solid var(--primary); border-radius: 9px; padding: 3px 10px; margin-left: 7px; line-height: 1; }
  .brand-pro { font-size: 36px; font-weight: 700; color: var(--primary); letter-spacing: 4px; line-height: 1; display: block; }
  .brand-sub { font-size: 10px; color: var(--text-hint); letter-spacing: 0.22em; text-transform: uppercase; margin-top: 10px; }

  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 28px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 15px;
    font-family: var(--font);
    color: var(--text);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    -webkit-appearance: none;
  }

  .field input::placeholder { color: #999999; }

  .field input:focus {
    border-color: var(--primary);
    background: var(--bg);
    box-shadow: 0 0 0 3px rgba(17,17,17,0.07);
  }

  /* Password field with eye toggle */
  .pw-wrap { position: relative; }

  .pw-wrap input { padding-right: 48px; }

  .eye-btn {
    position: absolute;
    top: 50%;
    right: 6px;
    transform: translateY(-50%);
    width: 38px;
    height: 38px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  .eye-btn:active { background: var(--surface-2); }

  .eye-btn svg {
    width: 20px;
    height: 20px;
    stroke: var(--text-hint);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .eye-btn.showing svg { stroke: var(--primary); }

  .eye-open { display: block; }
  .eye-closed { display: none; }
  .eye-btn.showing .eye-open { display: none; }
  .eye-btn.showing .eye-closed { display: block; }

  /* Remember me */
  .remember-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
    margin-bottom: 4px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .remember-check {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .remember-check svg {
    width: 12px;
    height: 12px;
    stroke: #ffffff;
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .remember-row.checked .remember-check {
    background: var(--primary);
    border-color: var(--primary);
  }

  .remember-row.checked .remember-check svg { opacity: 1; }

  .remember-label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .remember-hint {
    font-size: 11px;
    color: var(--text-hint);
    margin-left: auto;
  }

  .btn-login {
    width: 100%;
    margin-top: 10px;
    padding: 16px;
    background: var(--primary);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    color: #ffffff;
    cursor: pointer;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: opacity 0.18s, transform 0.1s;
  }

  .btn-login:active { transform: scale(0.98); opacity: 0.85; }
  .btn-login:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* Face ID button */
  .btn-faceid {
    display: none;
    width: 100%;
    margin-top: 12px;
    padding: 15px;
    background: var(--bg);
    border: 1.5px solid var(--primary);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    color: var(--primary);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-faceid.available { display: flex; }
  .btn-faceid:active { transform: scale(0.98); background: var(--surface); }
  .btn-faceid:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-faceid svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--error-text);
    text-align: center;
  }

  .error-msg.visible { display: block; }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--text-hint);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Face ID enroll modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.show { display: flex; }

  .modal-card {
    background: var(--bg);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    width: 100%;
    max-width: 340px;
    text-align: center;
  }

  .modal-icon {
    width: 56px;
    height: 56px;
    background: var(--surface);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .modal-icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--primary);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .modal-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-bottom: 22px; }

  .modal-btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--primary);
    color: #ffffff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .modal-btn-secondary {
    width: 100%;
    padding: 13px;
    background: none;
    color: var(--text-hint);
    border: none;
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <span class="brand-lex">LEX</span>
      <div class="brand-pro-box"><span class="brand-pro">PRO</span></div>
    </div>
    <div class="brand-sub">Real Estate Command</div>
  </div>

  <div class="card">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autocapitalize="none" />
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
        <button type="button" class="eye-btn" id="eyeBtn" aria-label="Show password">
          <svg class="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-closed" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><path d="M14.12 14.12A3 3 0 119.88 9.88"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div class="remember-row" id="rememberRow" onclick="toggleRemember()">
      <div class="remember-check">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="remember-label">Remember me</div>
      <div class="remember-hint">30 days</div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <button class="btn-faceid" id="faceidBtn">
      <svg viewBox="0 0 24 24"><path d="M7 3H5a2 2 0 00-2 2v2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><path d="M17 21h2a2 2 0 002-2v-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/><path d="M9 15s1 1.5 3 1.5 3-1.5 3-1.5"/></svg>
      <span id="faceidBtnText">Sign in with Face ID</span>
    </button>

    <div class="error-msg" id="errorMsg">Incorrect username or password.</div>
  </div>

  <div class="footer-note">LexPro Real Estate &bull; Springfield, MO</div>
</div>

<!-- FACE ID ENROLL MODAL -->
<div class="modal-overlay" id="enrollModal">
  <div class="modal-card">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24"><path d="M7 3H5a2 2 0 00-2 2v2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><path d="M17 21h2a2 2 0 002-2v-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/><path d="M9 15s1 1.5 3 1.5 3-1.5 3-1.5"/></svg>
    </div>
    <div class="modal-title">Enable Face ID?</div>
    <div class="modal-sub">Sign in instantly next time with Face ID or fingerprint — no typing required. Your password still works as a backup.</div>
    <button class="modal-btn-primary" id="enrollYes">Enable Face ID</button>
    <button class="modal-btn-secondary" id="enrollNo">Not now</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dqiiekdfmocvizzvmwlc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaWlla2RmbW9jdml6enZtd2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjcwOTcsImV4cCI6MjA5MTMwMzA5N30.Njm_nwlOJiHaapqeqj1ZhInkFUHiAqoglB5LuVauCwM';

  const REMEMBER_DAYS = 30;
  let rememberMe = false;
  let pendingUser = null; // user waiting on Face ID enroll decision

  function toggleRemember() {
    rememberMe = !rememberMe;
    document.getElementById('rememberRow').classList.toggle('checked', rememberMe);
  }

  // ── PASSWORD EYE TOGGLE ──
  const eyeBtn = document.getElementById('eyeBtn');
  const pwInput = document.getElementById('password');
  eyeBtn.addEventListener('click', () => {
    const showing = pwInput.type === 'text';
    pwInput.type = showing ? 'password' : 'text';
    eyeBtn.classList.toggle('showing', !showing);
    eyeBtn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  });

  // ── FACE ID (WebAuthn) HELPERS ──
  const FACEID_KEY = 'lexpro_faceid';

  function b64ToBuf(b64) {
    const bin = atob(b64.replace(/-/g, '+').replace(/_/g, '/'));
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }

  function bufToB64(buf) {
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  function getFaceIdData() {
    try {
      const raw = localStorage.getItem(FACEID_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  async function biometricsAvailable() {
    if (!window.PublicKeyCredential) return false;
    try {
      return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    } catch (e) { return false; }
  }

  // ── FACE ID ENROLL (after password login) ──
  async function enrollFaceId(user) {
    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const userId = crypto.getRandomValues(new Uint8Array(16));

      const cred = await navigator.credentials.create({
        publicKey: {
          challenge: challenge,
          rp: { name: 'LexPro', id: location.hostname },
          user: {
            id: userId,
            name: user.username,
            displayName: user.username,
          },
          pubKeyCredParams: [
            { type: 'public-key', alg: -7 },
            { type: 'public-key', alg: -257 },
          ],
          authenticatorSelection: {
            authenticatorAttachment: 'platform',
            userVerification: 'required',
            residentKey: 'preferred',
          },
          timeout: 60000,
          attestation: 'none',
        },
      });

      if (cred && cred.rawId) {
        localStorage.setItem(FACEID_KEY, JSON.stringify({
          credId: bufToB64(cred.rawId),
          user: user,
        }));
        return true;
      }
    } catch (e) {
      console.warn('Face ID enrollment cancelled or failed:', e);
    }
    return false;
  }

  // ── FACE ID SIGN IN ──
  async function faceIdLogin() {
    const stored = getFaceIdData();
    if (!stored || !stored.credId || !stored.user) return;

    const btn = document.getElementById('faceidBtn');
    const btnText = document.getElementById('faceidBtnText');
    const err = document.getElementById('errorMsg');
    btn.disabled = true;
    btnText.textContent = 'Scanning...';
    err.classList.remove('visible');

    try {
      const challenge = crypto.getRandomValues(new Uint8Array(32));

      const assertion = await navigator.credentials.get({
        publicKey: {
          challenge: challenge,
          rpId: location.hostname,
          allowCredentials: [{ type: 'public-key', id: b64ToBuf(stored.credId) }],
          userVerification: 'required',
          timeout: 60000,
        },
      });

      if (assertion) {
        sessionStorage.setItem('lexpro_user', JSON.stringify(stored.user));
        // Refresh the 30-day remember token on successful Face ID login
        localStorage.setItem('lexpro_remember', JSON.stringify({
          user: stored.user,
          expires: Date.now() + REMEMBER_DAYS * 24 * 60 * 60 * 1000
        }));
        btnText.textContent = 'Welcome back!';
        setTimeout(() => { window.location.href = 'home.html'; }, 500);
        return;
      }
    } catch (e) {
      console.warn('Face ID sign-in cancelled or failed:', e);
    }

    btn.disabled = false;
    btnText.textContent = 'Sign in with Face ID';
    err.textContent = 'Face ID didn\'t go through. Use your password instead.';
    err.classList.add('visible');
  }

  document.getElementById('faceidBtn').addEventListener('click', faceIdLogin);

  // ── SHOW FACE ID BUTTON IF ENROLLED + AVAILABLE ──
  (async function initFaceIdButton() {
    const stored = getFaceIdData();
    if (!stored) return;
    if (await biometricsAvailable()) {
      document.getElementById('faceidBtn').classList.add('available');
    }
  })();

  // ── AUTO-LOGIN if a valid remember token exists ──
  (function checkRemembered() {
    const session = sessionStorage.getItem('lexpro_user');
    if (session) { window.location.href = 'home.html'; return; }

    try {
      const tokenRaw = localStorage.getItem('lexpro_remember');
      if (!tokenRaw) return;
      const token = JSON.parse(tokenRaw);
      if (token.user && token.expires && Date.now() < token.expires) {
        sessionStorage.setItem('lexpro_user', JSON.stringify(token.user));
        window.location.href = 'home.html';
      } else {
        localStorage.removeItem('lexpro_remember');
      }
    } catch (e) {
      localStorage.removeItem('lexpro_remember');
    }
  })();

  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function finishLogin(user) {
    sessionStorage.setItem('lexpro_user', JSON.stringify(user));

    if (rememberMe) {
      localStorage.setItem('lexpro_remember', JSON.stringify({
        user: user,
        expires: Date.now() + REMEMBER_DAYS * 24 * 60 * 60 * 1000
      }));
    } else {
      localStorage.removeItem('lexpro_remember');
    }

    window.location.href = 'home.html';
  }

  async function handleLogin() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    if (!username || !password) {
      err.textContent = 'Please enter your username and password.';
      err.classList.add('visible');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    err.classList.remove('visible');

    try {
      const hash = await sha256(password);

      const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(username)}&password_hash=eq.${hash}&select=id,username,role`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });

      const data = await res.json();

      if (data && data.length > 0) {
        const user = data[0];
        btn.innerHTML = 'Welcome back!';

        // Offer Face ID enrollment if supported and not yet set up on this device
        const existing = getFaceIdData();
        const canBio = await biometricsAvailable();
        const alreadyEnrolledForUser = existing && existing.user && existing.user.username === user.username;

        if (canBio && !alreadyEnrolledForUser) {
          pendingUser = user;
          document.getElementById('enrollModal').classList.add('show');
        } else {
          setTimeout(() => finishLogin(user), 600);
        }
      } else {
        err.textContent = 'Incorrect username or password.';
        err.classList.add('visible');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    } catch (e) {
      err.textContent = 'Connection error. Please try again.';
      err.classList.add('visible');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  // ── ENROLL MODAL BUTTONS ──
  document.getElementById('enrollYes').addEventListener('click', async () => {
    const btn = document.getElementById('enrollYes');
    btn.disabled = true;
    btn.textContent = 'Setting up...';
    await enrollFaceId(pendingUser);
    document.getElementById('enrollModal').classList.remove('show');
    finishLogin(pendingUser);
  });

  document.getElementById('enrollNo').addEventListener('click', () => {
    document.getElementById('enrollModal').classList.remove('show');
    finishLogin(pendingUser);
  });

  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });

  document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js');
    });
  }
</script>
</body>
</html>
