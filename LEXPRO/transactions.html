<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LexPro">
<title>LexPro | Transactions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: #0a0f1e;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    background: #111827;
    border-bottom: 1px solid #1e2d40;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    width: 36px; height: 36px;
    background: #0a0f1e; border: 1px solid #1e2d40;
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    text-decoration: none; flex-shrink: 0;
  }
  .back-btn svg { width: 16px; height: 16px; stroke: #8a9bb0; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-title { font-size: 18px; font-weight: 600; color: #ffffff; flex: 1; }
  .topbar-icons { display: flex; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px;
    background: #0a0f1e; border: 1px solid #1e2d40;
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    text-decoration: none; position: relative; flex-shrink: 0;
  }
  .icon-btn svg { width: 16px; height: 16px; stroke: #8a9bb0; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .notif-dot {
    position: absolute; top: 7px; right: 7px;
    width: 6px; height: 6px;
    background: #2d9e6e; border-radius: 50%;
    border: 1.5px solid #0a0f1e; display: none;
  }

  .content { flex: 1; overflow-y: auto; padding: 16px 16px 40px; }

  .btn-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 28px 60px; gap: 16px;
  }
  .nav-btn {
    width: 100%; background: #111827; border: 1px solid #1e2d40;
    border-radius: 16px; padding: 20px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; text-decoration: none; transition: transform 0.1s;
  }
  .nav-btn:active { transform: scale(0.98); }
  .nav-btn.primary { background: #1a6b4a; border-color: #2d9e6e; }
  .btn-icon {
    width: 44px; height: 44px; background: rgba(255,255,255,0.07);
    border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-icon svg { width: 20px; height: 20px; stroke: #8a9bb0; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn.primary .btn-icon svg { stroke: #fff; }
  .btn-text { flex: 1; }
  .btn-title { font-size: 17px; font-weight: 600; color: #fff; }
  .btn-sub { font-size: 12px; color: #5a6a7e; margin-top: 3px; }
  .nav-btn.primary .btn-sub { color: #9fe1cb; }
  .btn-arrow { font-size: 22px; color: #2a3a50; line-height: 1; }
  .nav-btn.primary .btn-arrow { color: #9fe1cb; }

  .deal-card {
    background: #111827; border: 1px solid #1e2d40;
    border-radius: 16px; padding: 16px;
    margin-bottom: 12px; cursor: pointer;
    transition: transform 0.1s;
    text-decoration: none; display: block;
  }
  .deal-card:active { transform: scale(0.98); }
  .deal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .deal-name { font-size: 16px; font-weight: 600; color: #fff; }
  .deal-address { font-size: 12px; color: #5a6a7e; margin-top: 2px; }
  .countdown {
    font-size: 13px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    flex-shrink: 0; margin-left: 8px;
  }
  .countdown.green { background: rgba(45,158,110,0.15); color: #2d9e6e; border: 1px solid rgba(45,158,110,0.3); }
  .countdown.amber { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
  .countdown.red { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .countdown.gray { background: rgba(90,106,126,0.15); color: #5a6a7e; border: 1px solid rgba(90,106,126,0.3); }
  .stage-pill {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
    background: rgba(24,95,165,0.15); color: #378add;
    border: 1px solid rgba(55,138,221,0.25);
  }
  .progress-bar { height: 4px; background: #1e2d40; border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: #2d9e6e; border-radius: 2px; transition: width 0.3s; }
  .progress-label { font-size: 11px; color: #5a6a7e; }
  .empty-state { text-align: center; color: #2a3a50; font-size: 14px; padding: 60px 20px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .skeleton {
    background: #111827; border: 1px solid #1e2d40;
    border-radius: 16px; height: 120px; margin-bottom: 12px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="home.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="topbar-title">Transactions</div>
  <div class="topbar-icons">
    <a class="icon-btn" href="notifications.html">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div class="notif-dot" id="notifDot"></div>
    </a>
    <a class="icon-btn" href="calendar.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </a>
  </div>
</div>

<div class="btn-screen" id="btnScreen">
  <a class="nav-btn primary" href="transaction-list.html?side=buyer">
    <div class="btn-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="btn-text">
      <div class="btn-title">Buyers</div>
      <div class="btn-sub" id="buyerSub">Active buyer transactions</div>
    </div>
    <div class="btn-arrow">›</div>
  </a>
  <a class="nav-btn" href="transaction-list.html?side=seller">
    <div class="btn-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div class="btn-text">
      <div class="btn-title">Sellers</div>
      <div class="btn-sub" id="sellerSub">Active seller transactions</div>
    </div>
    <div class="btn-arrow">›</div>
  </a>
</div>
<div class="content" id="content" style="display:none"></div>

<script>
  const GHL_API_KEY = 'pit-4e98487c-3f65-409c-a264-16352f97c01a';
  const GHL_LOCATION_ID = 'R5PobkV1CRO23kz95yYB';
  const BUYER_PIPELINE = 'yrXgfxFIAGqdUoqLNNMc';
  const SELLER_PIPELINE = 'vvTfRute8i8HmIdqq4Jf';
  const SUPABASE_URL = 'https://dqiiekdfmocvizzvmwlc.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaWlla2RmbW9jdml6enZtd2xjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjcwOTcsImV4cCI6MjA5MTMwMzA5N30.Njm_nwlOJiHaapqeqj1ZhInkFUHiAqoglB5LuVauCwM';

  const BUYER_STAGES = ['Buyer Docs Signed','Showing Homes','Under Contract','Inspection Period','Appraisal and Financing Period','Clear To Close','Closed'];
  const SELLER_STAGES = ['Seller Docs Signed','Listing Photos Scheduled','Listing Photos Taken','Listing Live','Under Contract','Inspection Period','Clear To Close','Closed'];

  const user = JSON.parse(sessionStorage.getItem('lexpro_user') || '{}');
  if (!user.username) window.location.href = 'index.html';

  async function checkUnread() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/notifications?is_read=eq.false&limit=1`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const data = await res.json();
      if (data && data.length > 0) document.getElementById('notifDot').style.display = 'block';
    } catch(e) {}
  }

  checkUnread();

  function getDaysUntil(dateStr) {
    if (!dateStr) return null;
    const diff = new Date(dateStr).getTime() - Date.now();
    return Math.ceil(diff / 86400000);
  }

  function getCountdownClass(days) {
    if (days === null) return 'gray';
    if (days <= 7) return 'red';
    if (days <= 14) return 'amber';
    return 'green';
  }

  function getCountdownLabel(days) {
    if (days === null) return 'No close date';
    if (days < 0) return `${Math.abs(days)}d overdue`;
    if (days === 0) return 'Closing today';
    return `${days}d to close`;
  }

  function getProgress(stageName, side) {
    const stages = side === 'buyer' ? BUYER_STAGES : SELLER_STAGES;
    const idx = stages.findIndex(s => s.toLowerCase() === stageName?.toLowerCase());
    if (idx === -1) return 0;
    return Math.round(((idx + 1) / stages.length) * 100);
  }

  function getClosingDate(opp) {
    const cf = opp.customFields || [];
    const field = cf.find(f => f.fieldKey === 'contact.tentative_closing_date' || f.name?.toLowerCase().includes('tentative closing'));
    return field?.value || null;
  }

  function getAddress(opp, side) {
    const cf = opp.customFields || [];
    if (side === 'buyer') {
      const street = cf.find(f => f.fieldKey?.includes('buyer_subject_property_street') || f.name?.toLowerCase().includes('buyer subject property street'));
      return street?.value || opp.name || '—';
    } else {
      const street = cf.find(f => f.fieldKey?.includes('seller_subject_property_street') || f.name?.toLowerCase().includes('seller subject property street'));
      return street?.value || opp.name || '—';
    }
  }

  async function loadCounts() {
    for (const side of ['buyer', 'seller']) {
      const pipelineId = side === 'buyer' ? BUYER_PIPELINE : SELLER_PIPELINE;
      try {
        const res = await fetch(
          `https://services.leadconnectorhq.com/opportunities/search?location_id=${GHL_LOCATION_ID}&pipeline_id=${pipelineId}&limit=50`,
          { headers: { 'Authorization': `Bearer ${GHL_API_KEY}`, 'Version': '2021-07-28', 'Accept': 'application/json' } }
        );
        const data = await res.json();
        const active = (data.opportunities || []).filter(o => o.status !== 'lost' && o.pipelineStage?.name !== 'Closed');
        const el = document.getElementById(`${side}Sub`);
        if (el) el.textContent = `${active.length} active ${side} transaction${active.length !== 1 ? 's' : ''}`;
      } catch(e) {}
    }
  }

  loadCounts();
</script>
</body>
</html>
